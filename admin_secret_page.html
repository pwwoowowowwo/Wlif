<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة شاهي وليف</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 15px; max-width: 600px; margin: auto; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card { background: #8b4513; color: white; padding: 15px; border-radius: 12px; display: inline-block; width: 45%; margin: 2%; text-align: center; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #8b4513; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">لوحة الإدارة 📊</h1>
    <div id="admin-content" style="display:none;">
        <div class="box" style="text-align:center;">
            <div class="stat-card">المبيعات: <span id="total-money">0</span> ريال</div>
            <div class="stat-card">الطلبات المنجزة: <span id="total-count">0</span></div>
        </div>
        <div class="box">
            <h3>📦 إضافة صنف للمنيو</h3>
            <input id="n" placeholder="اسم الصنف"> 
            <input id="p" type="number" placeholder="السعر">
            <select id="c">
                <option value="شاهي">قسم الشاهي</option>
                <option value="مخبوزات">قسم المخبوزات</option>
                <option value="أخرى">أخرى</option>
            </select>
            <button onclick="save()">إضافة للمستودع ✅</button>
        </div>
        <div class="box" id="menu-list"></div>
        <div style="text-align:center;"><button onclick="clearAll()" style="background:red; width:200px;">تصفير اليومية 🧹</button></div>
    </div>

<script>
    const pass = prompt("كلمة مرور الإدارة:");
    if (pass === "1234") {
        document.getElementById('admin-content').style.display = 'block';
        const firebaseConfig = {
          apiKey: "AIzaSyAaEOC1qMvjYL7QNaQz7p1HvpjDAn6sPt8",
          authDomain: "shahi-walif.firebaseapp.com",
          projectId: "shahi-walif",
          databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com",
          storageBucket: "shahi-walif.firebasestorage.app",
          messagingSenderId: "359593950202",
          appId: "1:359593950202:web:9172faee5442536c49c243"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        db.ref('orders').on('value', (snap) => {
            let money = 0, count = 0;
            snap.forEach(s => { if(s.val().status === 'ready') { money += s.val().total; count++; } });
            document.getElementById('total-money').innerText = money;
            document.getElementById('total-count').innerText = count;
        });

        window.save = function() {
            const name = document.getElementById('n').value, price = document.getElementById('p').value, category = document.getElementById('c').value;
            if(name && price) db.ref('menu/' + Date.now()).set({ name, price: parseInt(price), category });
        }

        db.ref('menu').on('value', (snap) => {
            let h = '<h3>📋 المنيو الحالي</h3>'; snap.forEach(s => {
                h += `<div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between;">
                    <span>${s.val().name} (${s.val().category})</span>
                    <button onclick="del('${s.key}')" style="width:auto; background:red;">حذف</button>
                </div>`;
            });
            document.getElementById('menu-list').innerHTML = h;
        });

        window.del = function(id) { if(confirm("حذف؟")) db.ref('menu/'+id).remove(); }
        window.clearAll = function() { if(confirm("مسح الطلبات؟")) db.ref('orders').remove(); }
    } else {
        document.body.innerHTML = "<h1>صلاحية مرفوضة</h1>";
    }
</script>
</body>
</html>
