<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشير شاهي وليف - الفواتير</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --p: #8b4513; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .order-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-right: 8px solid #ddd; }
        .order-card.pending { border-right-color: #f1c40f; }
        .order-card.ready { border-right-color: #27ae60; opacity: 0.7; }

        /* تنسيق الفاتورة للطباعة */
        .invoice-box { border: 1px dashed #000; padding: 15px; margin-top: 10px; background: #fff; font-family: 'Courier New', Courier, monospace; }
        .invoice-header { text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .item-row { display: flex; justify-content: space-between; margin: 5px 0; }
        .total-row { border-top: 2px solid #000; margin-top: 10px; padding-top: 10px; font-weight: bold; font-size: 1.2em; }
        
        .btn-ready { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-print { background: #34495e; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; width: 100%; }

        @media print {
            body * { visibility: hidden; }
            .invoice-box, .invoice-box * { visibility: visible; }
            .invoice-box { position: absolute; left: 0; top: 0; width: 100%; }
            .btn-ready, .btn-print { display: none; }
        }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:var(--p);">🧾 طلبات وفواتير شاهي وليف</h2>
    <div id="orders-container">
        <!-- الطلبات تظهر هنا -->
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAaEOC1qMvjYL7QNaQz7p1HvpjDAn6sPt8",
      authDomain: "shahi-walif.firebaseapp.com",
      projectId: "shahi-walif",
      databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com",
      storageBucket: "shahi-walif.firebasestorage.app",
      messagingSenderId: "359593950202",
      appId: "1:359593950202:web:9172faee5442536c49c243"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // جلب الطلبات حياً
    db.ref('orders').on('value', (snap) => {
        const data = snap.val();
        const container = document.getElementById('orders-container');
        container.innerHTML = "";
        
        for(let id in data) {
            const order = data[id];
            const itemsList = order.items.map(i => `<div class="item-row"><span>- ${i}</span></div>`).join('');
            
            container.innerHTML += `
                <div class="order-card ${order.status}">
                    <div class="invoice-box" id="inv-${id}">
                        <div class="invoice-header">
                            <h3>شاهي وليف 🍵</h3>
                            <small>رقم الفاتورة: #${order.inv}</small><br>
                            <small>التاريخ: ${order.time}</small>
                        </div>
                        <p><b>النوع:</b> ${order.type} (${order.detail})</p>
                        <div class="items-area">
                            ${itemsList}
                        </div>
                        <div class="total-row">
                            <span>الإجمالي:</span>
                            <span>${order.total} ريال</span>
                        </div>
                    </div>
                    
                    ${order.status === 'pending' ? 
                        `<button class="btn-ready" onclick="completeOrder('${id}')">تجهيز الطلب ✅</button>` : 
                        `<p style="text-align:center; color:green; font-weight:bold;">تم الإنجاز</p>`
                    }
                    <button class="btn-print" onclick="window.print()">طباعة الفاتورة 🖨️</button>
                </div>
            `;
        }
    });

    function completeOrder(id) {
        db.ref('orders/' + id).update({ status: 'ready' });
    }
</script>
</body>
</html>
