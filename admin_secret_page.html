<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة شاهي وليف - الإحصائيات</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --p: #8b4513; --bg: #f0f2f5; --accent: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: var(--p); border-bottom: 2px solid var(--p); padding-bottom: 10px; }
        
        /* قسم الإحصائيات */
        .stat-box { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .stat-card { background: var(--p); color: white; padding: 20px; border-radius: 12px; text-align: center; width: 45%; }
        .stat-card span { display: block; font-size: 1.8em; font-weight: bold; }

        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--p); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-del { background: #e74c3c; width: auto; padding: 5px 15px; }
        .btn-clear { background: #2c3e50; margin-top: 20px; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <h1 style="text-align:center; color:var(--p);">لوحة التحكم والإحصائيات 📊</h1>

    <div class="card" style="margin-bottom:20px;">
        <h2>ملخص مبيعات اليوم</h2>
        <div class="stat-box">
            <div class="stat-card">
                <small>إجمالي المبيعات</small>
                <span id="stat-total">0</span> <small>ريال</small>
            </div>
            <div class="stat-card" style="background:var(--accent);">
                <small>طلبات مكتملة</small>
                <span id="stat-count">0</span>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>📦 إضافة للمستودع</h2>
            <input type="text" id="itemName" placeholder="اسم الصنف">
            <input type="number" id="itemPrice" placeholder="السعر">
            <select id="itemCat">
                <option value="شاهي">شاهي</option>
                <option value="مخبوزات">مخبوزات</option>
                <option value="أخرى">أخرى</option>
            </select>
            <button onclick="saveToMenu()">حفظ في المنيو ✅</button>
        </div>

        <div class="card">
            <h2>📋 المنيو الحالي</h2>
            <div id="menu-list">جاري التحميل...</div>
        </div>
    </div>

    <div class="card" style="margin-top:20px; text-align:center;">
        <h2 style="border-color:#e74c3c; color:#e74c3c;">إغلاق اليومية</h2>
        <p>سيتم مسح جميع الطلبات من شاشة الكاشير وبدء إحصائيات جديدة.</p>
        <button class="btn-clear" onclick="resetDay()">تصفير الطلبات الآن 🧹</button>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAaEOC1qMvjYL7QNaQz7p1HvpjDAn6sPt8",
      authDomain: "shahi-walif.firebaseapp.com",
      projectId: "shahi-walif",
      databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com",
      storageBucket: "shahi-walif.firebasestorage.app",
      messagingSenderId: "359593950202",
      appId: "1:359593950202:web:9172faee5442536c49c243"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- وظائف الإحصائيات ---
    db.ref('orders').on('value', (snap) => {
        const orders = snap.val();
        let totalSales = 0;
        let completedCount = 0;

        for(let id in orders) {
            if(orders[id].status === 'ready') {
                totalSales += orders[id].total;
                completedCount++;
            }
        }
        document.getElementById('stat-total').innerText = totalSales;
        document.getElementById('stat-count').innerText = completedCount;
    });

    // --- وظائف المنيو ---
    function saveToMenu() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const cat = document.getElementById('itemCat').value;
        if(!name || !price) return alert("املأ البيانات");

        db.ref('menu/' + Date.now()).set({
            name: name,
            price: parseInt(price),
            category: cat
        }).then(() => {
            alert("تمت الإضافة للمستودع");
            document.getElementById('itemName').value = "";
            document.getElementById('itemPrice').value = "";
        });
    }

    db.ref('menu').on('value', (snap) => {
        const data = snap.val();
        let h = '';
        for(let id in data) {
            h += `<div class="item-row">
                <div><b>${data[id].name}</b><br><small>${data[id].price} ريال</small></div>
                <button class="btn-del" onclick="deleteItem('${id}')">حذف</button>
            </div>`;
        }
        document.getElementById('menu-list').innerHTML = h || 'المستودع فارغ';
    });

    function deleteItem(id) {
        if(confirm("هل تريد حذف الصنف؟")) db.ref('menu/'+id).remove();
    }

    function resetDay() {
        if(confirm("تحذير: سيتم مسح جميع سجلات الطلبات الحالية. هل أنت متأكد؟")) {
            db.ref('orders').remove();
        }
    }
</script>
</body>
</html>
