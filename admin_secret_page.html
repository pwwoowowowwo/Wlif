<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كاشير شاهي وليف</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: white; padding: 20px; }
        .order-card { background: white; color: #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-right: 12px solid #8b4513; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>الطلبات النشطة 🕒</h1>
    <div id="list"></div>
<script>
    const pass = prompt("كلمة مرور الكاشير:");
    if (pass !== "1234") {
        document.body.innerHTML = "<h1>خطأ في الدخول</h1>";
    } else {
        const firebaseConfig = {
          apiKey: "AIzaSyAaEOC1qMvjYL7QNaQz7p1HvpjDAn6sPt8",
          authDomain: "shahi-walif.firebaseapp.com",
          projectId: "shahi-walif",
          databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com",
          storageBucket: "shahi-walif.firebasestorage.app",
          messagingSenderId: "359593950202",
          appId: "1:359593950202:web:9172faee5442536c49c243"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        db.ref('orders').on('value', (snap) => {
            const data = snap.val(); let h = '';
            for(let id in data) {
                const o = data[id]; if(o.status === 'ready') continue;
                h += `<div class="order-card">
                    <div><b>[${o.type}] #${o.inv} - ${o.detail}</b><p>${o.items.join(' + ')}</p><b>${o.total} ريال</b></div>
                    <button class="btn" onclick="done('${o.inv}')">تم التجهيز ✅</button>
                </div>`;
            }
            document.getElementById('list').innerHTML = h || 'لا توجد طلبات';
        });
        window.done = function(id) { db.ref('orders/'+id).update({ status: 'ready' }); }
    }
</script>
</body>
</html>
