<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم شاهي وليف</title>
    <style>
        :root { --p: #8b4513; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 320px 1fr 300px; gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); height: 85vh; display: flex; flex-direction: column; }
        input, select, button { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .scroll { overflow-y: auto; flex-grow: 1; }
        .pos-btn { background: #efe0d5; border: 1px solid var(--p); padding: 8px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 0.8em; font-weight: bold; }
        .order-box { border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-right: 5px solid #f1c40f; }
        .ready { border-right-color: #27ae60; background: #f9fff9; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="grid">
    <!-- إضافة وحذف الأصناف -->
    <div class="card">
        <h3 style="color:var(--p)">📦 إدارة المنيو</h3>
        <input type="text" id="n" placeholder="اسم الصنف">
        <input type="number" id="pr" placeholder="السعر">
        <select id="cat">
            <option value="شاهي">قسم الشاهي</option>
            <option value="مخبوزات">قسم المخبوزات</option>
            <option value="ألعاب">قسم الألعاب</option>
        </select>
        <button style="background: #27ae60; color:white;" id="addBtn">إضافة للمنيو ✅</button>
        <div class="scroll" id="invList"></div>
    </div>

    <!-- فواتير العملاء -->
    <div class="card">
        <h3 style="color:var(--p)">📥 طلبات الزبائن</h3>
        <div class="scroll" id="ordersList"></div>
    </div>

    <!-- كاشير البيع المباشر -->
    <div class="card">
        <h3 style="color:var(--p)">⚡ بيع كاونتر</h3>
        <div id="quickPos" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div>
        <div style="margin-top:10px; border-top:2px solid #eee; padding-top:10px;">
            <b>الإجمالي:</b> <span id="posTotal">0</span> ﷼
            <button style="background: var(--p); color:white;" id="savePos">إصدار فاتورة</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaEOC1qMvjYL7QNaQz7p1HvpjDAn6sPt8",
      authDomain: "shahi-walif.firebaseapp.com",
      databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com",
      projectId: "shahi-walif",
      storageBucket: "shahi-walif.firebasestorage.app",
      messagingSenderId: "359593950202",
      appId: "1:359593950202:web:9172faee5442536c49c243"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // إضافة صنف
    document.getElementById('addBtn').onclick = () => {
        const name = document.getElementById('n').value;
        const price = document.getElementById('pr').value;
        const category = document.getElementById('cat').value;
        if(name && price) {
            push(ref(db, 'menu'), { name, price: parseInt(price), category })
            .then(() => alert("تمت الإضافة!"))
            .catch(e => alert("خطأ: " + e.message));
        }
    };

    // عرض المنيو وأزرار الكاشير
    onValue(ref(db, 'menu'), (snap) => {
        const data = snap.val();
        const invList = document.getElementById('invList');
        const quickPos = document.getElementById('quickPos');
        invList.innerHTML = ""; quickPos.innerHTML = "";
        for(let id in data) {
            invList.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>${data[id].name}</span>
                <button style="width:auto; background:red; color:white; padding:2px 5px;" onclick="deleteItem('${id}')">حذف</button>
            </div>`;
            quickPos.innerHTML += `<div class="pos-btn" onclick="addToCart('${data[id].name}', ${data[id].price})">${data[id].name}</div>`;
        }
    });

    window.deleteItem = (id) => remove(ref(db, 'menu/' + id));

    // السلة اليدوية
    let cart = []; let total = 0;
    window.addToCart = (n, p) => { cart.push(n); total += p; document.getElementById('posTotal').innerText = total; };
    document.getElementById('savePos').onclick = () => {
        if(cart.length === 0) return;
        const inv = Math.floor(1000 + Math.random()*9000);
        set(ref(db, 'orders/' + inv), { inv, items: cart, total, status: 'ready', type: 'كاونتر', time: new Date().toLocaleTimeString('ar-SA') });
        cart = []; total = 0; document.getElementById('posTotal').innerText = 0; alert("تم الحفظ");
    };

    // عرض الطلبات
    onValue(ref(db, 'orders'), (snap) => {
        const orders = snap.val();
        const list = document.getElementById('ordersList');
        list.innerHTML = "";
        for(let id in orders) {
            const o = orders[id];
            list.innerHTML += `<div class="order-box ${o.status}">
                <b>#${o.inv} - ${o.total} ﷼</b><br><small>${o.items.join(' + ')}</small><br>
                ${o.status === 'pending' ? `<button onclick="markReady('${id}')">تم التجهيز</button>` : '✅ مكتمل'}
            </div>`;
        }
    });

    window.markReady = (id) => update(ref(db, 'orders/' + id), { status: 'ready' });
</script>
</body>
</html>
