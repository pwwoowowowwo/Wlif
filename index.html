<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كاشير شاهي وليف - الإصدار النهائي</title>
    <style>
        :root { --bg: #f8f9fa; --maroon: #800000; --dark: #1a1c23; --shadow: 0 4px 6px rgba(0,0,0,0.1); }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { height: 50px; background: var(--dark); color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .tax-id { color: #ffeb3b; font-size: 14px; font-weight: bold; }

        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }

        /* منطقة المنتجات */
        .menu-side { flex: 2.8; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .category-bar { display: flex; gap: 10px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 5px; }
        .cat-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; box-shadow: var(--shadow); font-weight: bold; cursor: pointer; background: white; }
        .cat-btn.active { background: var(--maroon); color: white; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        .item-card { background: white; border-radius: 10px; aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #eee; cursor: pointer; text-align: center; }
        .item-card b { color: var(--maroon); margin-top: 4px; }

        /* السلة (تكبير 10%) */
        .cart-side { flex: 1.2; min-width: 200px; background: white; border-radius: 12px; box-shadow: var(--shadow); display: flex; flex-direction: column; padding: 10px; border-top: 5px solid var(--maroon); }
        .cart-items { flex: 1; overflow-y: auto; margin-bottom: 10px; font-size: 14px; }
        .cart-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f9f9f9; }

        /* لوحة الأرقام تحت السلة */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 10px; }
        .num-btn { padding: 12px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .num-btn.active { background: var(--maroon); color: white; }

        .totals-area { background: #fdfdfd; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; }
        .total-line { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; }
        .final-price { font-size: 22px; font-weight: bold; color: var(--maroon); text-align: center; border-top: 2px solid #eee; padding-top: 5px; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn-pay { grid-column: span 2; background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-hold { background: #ffa000; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-new { background: #0277bd; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }

        /* تنسيق الطباعة (image_9.png) */
        @media print {
            body * { visibility: hidden; }
            #receipt, #receipt * { visibility: visible; }
            #receipt { position: absolute; left: 0; top: 0; width: 80mm; padding: 5mm; text-align: center; }
            .r-line { display: flex; justify-content: space-between; font-size: 12px; margin: 2px 0; }
        }
    </style>
</head>
<body>

<header>
    <span>🍃 شاهي وليف | POS</span>
    <span class="tax-id">الرقم الضريبي: 310071502100003</span>
</header>

<div class="main-layout">
    <div class="menu-side">
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('tea', this)">الشاهي</button>
            <button class="cat-btn" onclick="filterCat('bakery', this)">المخبوزات</button>
            <button class="cat-btn" onclick="filterCat('sides', this)">الإضافات</button>
        </div>
        <div id="itemsGrid" class="items-grid"></div>
    </div>

    <div class="cart-side">
        <div style="font-weight: bold; text-align: center; margin-bottom: 10px;" id="invNum">طلب جديد #1</div>
        <div id="cartList" class="cart-items"></div>
        
        <!-- لوحة الأرقام -->
        <div class="numpad">
            <button class="num-btn active" onclick="setQty(1, this)">1</button>
            <button class="num-btn" onclick="setQty(2, this)">2</button>
            <button class="num-btn" onclick="setQty(3, this)">3</button>
            <button class="num-btn" onclick="setQty(4, this)">4</button>
            <button class="num-btn" onclick="setQty(5, this)">5</button>
            <button class="num-btn" onclick="setQty(6, this)">6</button>
            <button class="num-btn" onclick="setQty(7, this)">7</button>
            <button class="num-btn" onclick="setQty(8, this)">8</button>
            <button class="num-btn" onclick="setQty(9, this)">9</button>
            <button class="num-btn" style="grid-column: span 3" onclick="setQty(10, this)">10</button>
        </div>

        <div class="totals-area">
            <div class="total-line"><span>الإجمالي قبل الضريبة:</span><span id="subTotal">0.00</span></div>
            <div class="total-line"><span>ضريبة القيمة المضافة 15%:</span><span id="taxAmount">0.00</span></div>
            <div class="final-price"><span id="grandTotal">0.00</span> ﷼</div>
        </div>

        <div class="action-btns">
            <button class="btn-pay" onclick="printReceipt()">طـباعة الفاتورة ✅</button>
            <button class="btn-hold" onclick="holdInvoice()">تعليق الفاتورة</button>
            <button class="btn-new" onclick="resetCart()">طلب جديد</button>
        </div>
    </div>
</div>

<div id="receipt" style="display:none"></div>

<script>
    const products = [
        { name: "شاهي أحمر (ص)", price: 2, cat: "tea" }, { name: "شاهي وليف (ص)", price: 2, cat: "tea" },
        { name: "فطيرة أجبان", price: 12, cat: "bakery" }, { name: "خلية نحل", price: 15, cat: "bakery" },
        { name: "مكسرات", price: 5, cat: "sides" }, { name: "ماء", price: 1, cat: "sides" }
        // ... يمكنك إضافة باقي المنيو هنا
    ];

    let cart = [];
    let currentQty = 1;
    let invCounter = 1;

    function setQty(n, btn) {
        currentQty = n;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('itemsGrid').innerHTML = products.filter(p => p.cat === cat).map(p => `
            <div class="item-card" onclick="addToCart('${p.name}', ${p.price})">
                <span>${p.name}</span><b>${p.price} ﷼</b>
            </div>`).join('');
    }

    function addToCart(name, price) {
        for(let i=0; i<currentQty; i++) cart.push({ name, price });
        render();
    }

    function render() {
        document.getElementById('cartList').innerHTML = cart.map((item, i) => `
            <div class="cart-row"><span>${item.name}</span><span>${item.price} <small onclick="cart.splice(${i},1);render()" style="color:red;cursor:pointer">✕</small></span></div>
        `).join('');
        let sub = cart.reduce((s, i) => s + i.price, 0);
        let tax = sub * 0.15;
        document.getElementById('subTotal').innerText = sub.toFixed(2);
        document.getElementById('taxAmount').innerText = tax.toFixed(2);
        document.getElementById('grandTotal').innerText = (sub + tax).toFixed(2);
    }

    function holdInvoice() {
        if(cart.length > 0) {
            alert("تم تعليق الفاتورة رقم " + invCounter);
            resetCart();
        }
    }

    function resetCart() {
        cart = [];
        invCounter++;
        document.getElementById('invNum').innerText = "طلب جديد #" + invCounter;
        render();
    }

    function printReceipt() {
        if(cart.length === 0) return;
        const total = document.getElementById('grandTotal').innerText;
        const tax = document.getElementById('taxAmount').innerText;
        let html = `<h3>شاهي وليف 🍃</h3><p>فاتورة ضريبية مبسطة</p><p>الرقم الضريبي: 310071502100003</p><hr>`;
        cart.forEach(i => html += `<div class="r-line"><span>${i.name}</span><span>${i.price.toFixed(2)}</span></div>`);
        html += `<hr><div class="r-line"><b>الضريبة 15%</b><b>${tax}</b></div>`;
        html += `<div class="r-line" style="font-size:16px"><b>الإجمالي</b><b>${total} ﷼</b></div><hr><p>شكراً لتسوقكم</p>`;
        document.getElementById('receipt').innerHTML = html;
        window.print();
        resetCart();
    }

    window.onload = () => filterCat('tea', document.querySelector('.cat-btn'));
</script>
</body>
</html>
