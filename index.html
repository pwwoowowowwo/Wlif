<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كاشير شاهي وليف - النسخة المدمجة</title>
    <style>
        :root { --bg: #e0e5ec; --maroon: #800000; --shadow: 2px 2px 4px #bebebe, -2px -2px 4px #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* تصغير الصفحة بنسبة 50% تقريباً عبر ضبط القياسات */
        body { background: var(--bg); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; font-size: 10px; }

        header { height: 30px; background: #1a1c23; color: white; display: flex; align-items: center; padding: 0 10px; justify-content: space-between; font-size: 11px; }

        .tabs-bar { display: flex; background: #cfd4da; padding: 2px 5px 0; gap: 3px; overflow-x: auto; height: 25px; }
        .invoice-tab { padding: 4px 10px; border: none; border-radius: 6px 6px 0 0; background: #bdc3c7; cursor: pointer; font-size: 9px; }
        .invoice-tab.active { background: var(--bg); color: var(--maroon); font-weight: bold; }

        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 5px; gap: 5px; }

        /* يمين: المنتجات والكيبورد */
        .menu-side { flex: 2; display: flex; flex-direction: column; gap: 5px; }
        
        .numpad { display: flex; gap: 2px; background: white; padding: 4px; border-radius: 8px; box-shadow: var(--shadow); justify-content: center; }
        .num-btn { width: 28px; height: 28px; border-radius: 5px; border: none; background: var(--bg); font-weight: bold; cursor: pointer; font-size: 11px; box-shadow: 1px 1px 3px #bebebe; }
        .num-btn.active { background: var(--maroon); color: white; }

        .category-bar { display: flex; gap: 3px; }
        .cat-btn { flex: 1; padding: 6px; border-radius: 6px; border: none; background: white; box-shadow: var(--shadow); cursor: pointer; font-size: 10px; font-weight: bold; }
        .cat-btn.active { background: var(--maroon); color: white; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; overflow-y: auto; padding: 2px; flex: 1; }
        .item-card { background: white; border-radius: 8px; padding: 8px 2px; text-align: center; border: none; box-shadow: var(--shadow); cursor: pointer; font-size: 9px; line-height: 1.2; }
        .item-card b { display: block; color: var(--maroon); margin-top: 2px; font-size: 10px; }

        /* يسار: السلة */
        .cart-side { flex: 0.8; min-width: 220px; display: flex; flex-direction: column; background: white; border-radius: 10px; box-shadow: var(--shadow); padding: 8px; }
        .cart-items { flex: 1; overflow-y: auto; border-bottom: 1px dashed #ccc; margin-bottom: 5px; }
        .cart-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 10px; border-bottom: 1px solid #f9f9f9; }
        
        .totals { padding: 5px 0; }
        .total-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 2px; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .pay-btn { grid-column: span 2; background: #28a745; color: white; padding: 10px; border-radius: 8px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; }
        .hold-btn, .new-btn { background: #6c757d; color: white; border: none; border-radius: 6px; cursor: pointer; padding: 6px; font-size: 10px; }
        .new-btn { background: #007bff; }

        /* تنسيق نظيف للطباعة */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; text-align: center; font-size: 12px; }
        }
    </style>
</head>
<body>

<header>
    <span>🍃 شاهي وليف | POS</span>
    <small>الرقم الضريبي: 300012345600003</small>
</header>

<div class="tabs-bar" id="tabsBar"></div>

<div class="main-layout">
    <div class="menu-side">
        <div class="numpad" id="numpad">
            <script>
                for(let i=1; i<=10; i++) document.write(`<button class="num-btn ${i==1?'active':''}" onclick="setQty(${i}, this)">${i}</button>`);
            </script>
        </div>

        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('شاهي', this)">🫖 شاي</button>
            <button class="cat-btn" onclick="filterCat('مخبوزات', this)">🥐 مخبوزات</button>
            <button class="cat-btn" onclick="filterCat('جانبي', this)">🍿 إضافات</button>
        </div>

        <div class="items-grid" id="itemsGrid"></div>
    </div>

    <div class="cart-side">
        <div class="cart-items" id="cartContent"></div>
        
        <div class="totals">
            <div class="total-row"><span>المجموع:</span><span id="sub">0.00</span></div>
            <div class="total-row"><span>الضريبة:</span><span id="tax">0.00</span></div>
            <div class="total-row" style="font-weight:bold; font-size:14px; border-top:1px solid #eee; padding-top:4px;">
                <span>الإجمالي:</span><span id="grand">0.00</span>
            </div>
        </div>

        <div class="action-grid">
            <button class="hold-btn" onclick="holdInvoice()">⏸ تعليق</button>
            <button class="new-btn" onclick="newInvoice()">➕ جديدة</button>
            <button class="pay-btn" onclick="processPayment()">✅ دفع وطباعة</button>
        </div>
    </div>
</div>

<div id="print-area" style="display:none"></div>

<script>
    // المنتجات المستخرجة من صورة المنيو (image_5.png)
    const allProducts = [
        {name: "شاي احمر ص", price: 2, cat: "شاهي"}, {name: "شاي احمر و", price: 4, cat: "شاهي"}, {name: "شاي احمر ز", price: 6, cat: "شاهي"},
        {name: "شاي وليف ص", price: 2, cat: "شاهي"}, {name: "شاي وليف و", price: 4, cat: "شاهي"}, {name: "شاي وليف ز", price: 6, cat: "شاهي"},
        {name: "كرك", price: 5, cat: "شاهي"}, {name: "أتاي", price: 5, cat: "شاهي"}, {name: "زنجبيل ليمون", price: 5, cat: "شاهي"},
        {name: "برادي شاي", price: 12, cat: "شاهي"},
        {name: "4 أجبان", price: 12, cat: "مخبوزات"}, {name: "جبنة سائلة", price: 8, cat: "مخبوزات"}, {name: "فطيرة لبنة", price: 8, cat: "مخبوزات"},
        {name: "فطيرة شيدر", price: 8, cat: "مخبوزات"}, {name: "نحل كلاسيك", price: 15, cat: "مخبوزات"}, {name: "نحل قرفة", price: 16, cat: "مخبوزات"},
        {name: "مكسرات", price: 5, cat: "جانبي"}, {name: "رغيفة سمسم", price: 2, cat: "جانبي"}, {name: "بسكوت مالح", price: 2, cat: "جانبي"}, {name: "ماء", price: 1, cat: "جانبي"}
    ];

    let currentQty = 1;
    let invoices = { "1": [] };
    let activeInv = "1";

    function setQty(n, btn) {
        currentQty = n;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = allProducts.filter(p => p.cat === cat);
        document.getElementById('itemsGrid').innerHTML = filtered.map(p => `
            <button class="item-card" onclick="addToCart('${p.name}', ${p.price})">
                ${p.name} <b>${p.price} ﷼</b>
            </button>`).join('');
    }

    function addToCart(name, price) {
        for(let i=0; i<currentQty; i++) invoices[activeInv].push({name, price});
        updateUI();
    }

    function updateUI() {
        const content = document.getElementById('cartContent');
        content.innerHTML = invoices[activeInv].length ? invoices[activeInv].map((item, idx) => `
            <div class="cart-row"><span>${item.name}</span> <span>${item.price} <button onclick="remove(${idx})" style="border:none; color:red; background:none; padding:0 5px;">✕</button></span></div>
        `).join('') : '<div style="text-align:center; padding-top:20px; color:#999">الفاتورة فارغة</div>';
        
        let sub = invoices[activeInv].reduce((s, i) => s + i.price, 0);
        let tax = sub * 0.15; // حساب ضريبة القيمة المضافة 15%
        document.getElementById('sub').innerText = sub.toFixed(2);
        document.getElementById('tax').innerText = tax.toFixed(2);
        document.getElementById('grand').innerText = (sub + tax).toFixed(2);
        renderTabs();
    }

    function remove(idx) { invoices[activeInv].splice(idx, 1); updateUI(); }

    function newInvoice() {
        let id = (Object.keys(invoices).length + 1).toString();
        invoices[id] = [];
        activeInv = id;
        updateUI();
    }

    function renderTabs() {
        document.getElementById('tabsBar').innerHTML = Object.keys(invoices).map(id => `
            <button class="invoice-tab ${activeInv==id?'active':''}" onclick="activeInv='${id}'; updateUI()">طلب ${id}</button>
        `).join('');
    }

    function processPayment() {
        if(invoices[activeInv].length === 0) return;
        const total = document.getElementById('grand').innerText;
        
        // تجهيز بيانات الطباعة
        let printHTML = `<h3>شاهي وليف</h3><p>الرقم الضريبي: 300012345600003</p><p>فاتورة رقم: ${activeInv}</p><hr>`;
        invoices[activeInv].forEach(i => printHTML += `<p style="display:flex; justify-content:space-between"><span>${i.name}</span> <span>${i.price} ﷼</span></p>`);
        printHTML += `<hr><b>الإجمالي شامل الضريبة: ${total} ﷼</b>`;
        
        document.getElementById('print-area').innerHTML = printHTML;
        window.print(); // فتح نافذة الطباعة مباشرة

        delete invoices[activeInv];
        if(Object.keys(invoices).length === 0) invoices["1"] = [];
        activeInv = Object.keys(invoices)[0];
        updateUI();
    }

    window.onload = () => filterCat('شاهي', document.querySelector('.cat-btn'));
</script>
</body>
</html>
