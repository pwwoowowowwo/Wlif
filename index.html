<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاهي وليف - النسخة المعتمدة</title>
    <style>
        :root { 
            --bg: #e0e5ec;
            --shadow-out: 7px 7px 14px #bebebe, -7px -7px 14px #ffffff;
            --shadow-in: inset 5px 5px 10px #bebebe, inset -5px -5px 10px #ffffff;
            --maroon: #800000;
        }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; }

        /* الترويسة السوداء */
        .top-nav { width: 100%; background: #1a1c23; color: white; padding: 15px 0; text-align: center; font-weight: bold; font-size: 20px; }

        /* أزرار الإدارة العلوية (مثل الصورة) */
        .admin-tabs { display: flex; gap: 10px; margin: 20px 0; width: 95%; max-width: 500px; justify-content: space-between; }
        .admin-item { 
            flex: 1; background: var(--bg); border: none; border-radius: 15px; padding: 10px; 
            box-shadow: var(--shadow-out); cursor: pointer; text-align: center; font-size: 11px; font-weight: bold;
        }
        .admin-item.active { box-shadow: var(--shadow-in); color: var(--maroon); }
        .admin-item img { width: 24px; display: block; margin: 0 auto 5px; }

        /* إطار الأصناف المربع (مثل الصورة) */
        .menu-frame { 
            width: 90%; max-width: 500px; border: 2px solid var(--maroon); border-radius: 20px; 
            padding: 15px; margin-bottom: 20px; position: relative;
        }
        .cat-bar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 15px; }
        .cat-tab { 
            padding: 5px 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 11px; 
            background: var(--bg); cursor: pointer; font-weight: bold;
        }
        .cat-tab.active { background: white; color: var(--maroon); box-shadow: var(--shadow-in); }

        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .p-card { 
            background: white; border-radius: 15px; padding: 15px 5px; text-align: center; 
            box-shadow: var(--shadow-out); cursor: pointer; border: none; transition: 0.2s;
        }
        .p-card:active { box-shadow: var(--shadow-in); transform: scale(0.95); }
        .p-card strong { display: block; font-size: 13px; margin-bottom: 5px; }
        .p-card b { color: var(--maroon); font-size: 12px; }

        /* قسم الفاتورة الحالية */
        .cart-section { width: 90%; max-width: 500px; padding: 15px; background: var(--bg); border-radius: 20px; box-shadow: var(--shadow-out); }
        .cart-title { color: var(--maroon); font-weight: bold; margin-bottom: 10px; }
        
        .bill-screen { 
            background: white; border-radius: 15px; padding: 20px; min-height: 100px; 
            box-shadow: var(--shadow-in); margin-bottom: 15px; text-align: center; color: #999;
        }

        .summary-line { 
            border-top: 2px solid var(--maroon); border-radius: 0 0 15px 15px;
            padding: 15px; background: #eee; margin-bottom: 15px;
        }
        .total-row { display: flex; justify-content: space-between; align-items: center; color: var(--maroon); font-weight: 900; font-size: 20px; }

        /* الأزرار الكبيرة (مثل الصورة) */
        .pay-btn { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; color: white; 
            font-weight: bold; margin-bottom: 10px; cursor: pointer; font-size: 14px;
        }
        .btn-green { background: #56a37a; }
        .btn-blue { background: #4f46e5; }
        .btn-red { background: #d34336; }
        .btn-orange { background: #d97706; margin-bottom: 10px; } /* لتعليق الفاتورة */

        /* تابات الفواتير المعلقة */
        .hold-tabs { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; width: 100%; }
        .hold-btn { padding: 5px 15px; background: #ccc; border-radius: 8px; font-size: 10px; border: none; cursor: pointer; }
        .hold-btn.active { background: var(--maroon); color: white; }

    </style>
</head>
<body>

    <div class="top-nav">🍃 شاهي وليف</div>

    <div class="admin-tabs">
        <button class="admin-item active">📊<br>الكاشير</button>
        <button class="admin-item">💰<br>المبيعات</button>
        <button class="admin-item">📄<br>الفواتير</button>
        <button class="admin-item">📈<br>التقارير</button>
    </div>

    <div id="hold-bar" class="hold-tabs"></div>

    <div class="menu-frame">
        <div class="cat-bar">
            <button class="cat-tab active" onclick="filter('الكل', this)">الكل</button>
            <button class="cat-tab" onclick="filter('شاهي', this)">☕ شاهي</button>
            <button class="cat-tab" onclick="filter('مخبوزات', this)">🥐 مخبوزات</button>
            <button class="cat-tab" onclick="filter('ألعاب', this)">🎲 ألعاب</button>
        </div>
        <div class="products-grid" id="p-grid">
            </div>
    </div>

    <div class="cart-section">
        <div class="cart-title">🛒 الفاتورة الحالية</div>
        <div class="bill-screen" id="bill-content">أضف طلباً..</div>
        
        <div class="summary-line">
            <div style="font-size: 11px; display: flex; justify-content: space-between;"><span>المجموع:</span><span id="subtotal">0.00 ﷼</span></div>
            <div style="font-size: 11px; display: flex; justify-content: space-between; margin-bottom: 5px;"><span>الضريبة:</span><span id="tax">0.00 ﷼</span></div>
            <div class="total-row"><span>الإجمالي:</span><span id="total">0.00 ﷼</span></div>
        </div>

        <button class="pay-btn btn-green" onclick="pay('كاش')">💵 كاش وطباعة</button>
        <button class="pay-btn btn-blue" onclick="pay('شبكة')">💳 شبكة وطباعة</button>
        <button class="pay-btn btn-orange" onclick="hold()">⏸ تعليق الطلب</button>
        <button class="pay-btn btn-red" onclick="clearCart()">✖ مسح السلة</button>
    </div>

<script>
    const products = [
        {name: "كرك وليف", price: 3, cat: "شاهي"},
        {name: "شاي نعناع", price: 2, cat: "شاهي"},
        {name: "فطيرة جبن", price: 5, cat: "مخبوزات"},
        {name: "كرواسون", price: 7, cat: "مخبوزات"},
        {name: "جاكارو", price: 10, cat: "ألعاب"},
        {name: "ماء", price: 1, cat: "شاهي"}
    ];

    let invoices = { 'الرئيسية': [] };
    let activeId = 'الرئيسية';
    let hCount = 0;

    function renderMenu(cat = 'الكل') {
        const grid = document.getElementById('p-grid');
        const items = cat === 'الكل' ? products : products.filter(p => p.cat === cat);
        grid.innerHTML = items.map(p => `
            <button class="p-card" onclick="add('${p.name}', ${p.price})">
                <strong>${p.name}</strong>
                <b>${p.price.toFixed(2)} ﷼</b>
            </button>
        `).join('');
    }

    function filter(cat, btn) {
        document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderMenu(cat);
    }

    function add(name, price) {
        const cart = invoices[activeId];
        const item = cart.find(i => i.name === name);
        if(item) item.qty++; else cart.push({name, price, qty: 1});
        update();
    }

    function update() {
        const screen = document.getElementById('bill-content');
        const cart = invoices[activeId];
        
        if(cart.length === 0) {
            screen.innerHTML = "أضف طلباً..";
        } else {
            screen.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; color:#333; font-size:13px; margin-bottom:5px;"><span>${i.name} (${i.qty})</span><span>${(i.price*i.qty).toFixed(2)}</span></div>`).join('');
        }

        let sub = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        let tax = sub * 0.15;
        document.getElementById('subtotal').innerText = sub.toFixed(2) + " ﷼";
        document.getElementById('tax').innerText = tax.toFixed(2) + " ﷼";
        document.getElementById('total').innerText = (sub + tax).toFixed(2) + " ﷼";
        renderHoldTabs();
    }

    function hold() {
        if(invoices[activeId].length === 0 && activeId === 'الرئيسية') return;
        hCount++;
        const newId = 'طلب ' + hCount;
        invoices[newId] = [];
        activeId = newId;
        update();
    }

    function renderHoldTabs() {
        const bar = document.getElementById('hold-bar');
        bar.innerHTML = Object.keys(invoices).map(id => `
            <button class="hold-btn ${activeId === id ? 'active' : ''}" onclick="switchInv('${id}')">${id}</button>
        `).join('');
    }

    function switchInv(id) { activeId = id; update(); }

    function pay(m) {
        if(invoices[activeId].length === 0) return;
        alert("تم دفع الفاتورة بنجاح عبر " + m);
        if(activeId === 'الرئيسية') invoices['الرئيسية'] = []; else { delete invoices[activeId]; activeId = 'الرئيسية'; }
        update();
    }

    function clearCart() { if(confirm("مسح؟")) { invoices[activeId] = []; update(); } }

    window.onload = () => renderMenu();
</script>
</body>
</html>
