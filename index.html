<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشير شاهي وليف - المطور</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* جعل الصفحة كاملة تدعم السكرول */
        body { 
            background: var(--bg); 
            margin: 0; 
            overflow-y: auto; 
            min-height: 100vh;
        }
        
        header { 
            height: 55px; 
            background: var(--maroon); 
            color: white; 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }

        .main-layout { 
            display: flex; 
            flex-direction: row; 
            padding: 10px; 
            gap: 10px; 
            height: calc(100vh - 65px); /* ارتفاع ثابت لتمكين السكرول الداخلي */
        }

        /* قسم الأصناف (50%) مع سكرول مستقل */
        .menu-side { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .category-bar { 
            display: flex; 
            gap: 8px; 
            padding: 10px; 
            overflow-x: auto; 
            background: #f9f9f9;
            flex-shrink: 0;
            border-bottom: 1px solid #eee;
        }
        
        .cat-btn { padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; background: white; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .cat-btn.active { background: var(--maroon); color: white; }
        
        .items-scroll-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px;
        }
        
        .items-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 10px; 
        }
        
        .item-card { 
            background: var(--bg); 
            border-radius: 10px; 
            padding: 15px; 
            border: 1px solid #ddd; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .item-card:active { transform: scale(0.95); }

        /* قسم السلة (50%) مع سكرول مستقل */
        .cart-side { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: white; 
            border-radius: 12px; 
            padding: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .cart-items-scroll { 
            flex: 1; 
            overflow-y: auto; 
            margin: 10px 0; 
            border: 1px solid #f5f5f5;
            padding: 5px;
            border-radius: 8px;
        }
        
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-weight: bold; }
        .remove-btn { color: white; border: none; background: #ff4444; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }

        .cart-footer { flex-shrink: 0; }
        .summary-box { background: #fffcf0; padding: 12px; border-radius: 10px; border: 1px dashed var(--gold); margin-bottom: 10px; }
        .total-line { display: flex; justify-content: space-between; font-weight: 800; color: var(--maroon); font-size: 20px; }

        .payment-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .pay-btn { padding: 12px 2px; border: 1px solid #ddd; border-radius: 8px; background: white; font-weight: bold; cursor: pointer; }
        .pay-btn.active { background: #2e7d32; color: white; }
        
        .btn-pay-final { width: 100%; background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; height: auto; }
            .menu-side, .cart-side { height: 500px; }
        }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<header>
    <div class="header-btns">
        <button class="nav-btn" onclick="location.href='index.html'">↩</button>
        <button class="nav-btn" style="background:#444;" onclick="window.print()">🔍</button>
    </div>
    <span style="font-weight: bold;">🌿 شاهي وليف</span>
</header>

<div class="main-layout">
    <!-- قائمة الأصناف: 50% وسكرول داخلي -->
    <div class="menu-side">
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('tea', this)">شاي</button>
            <button class="cat-btn" onclick="filterCat('karak', this)">كرك</button>
            <button class="cat-btn" onclick="filterCat('bakery', this)">مخبوزات</button>
            <button class="cat-btn" onclick="filterCat('addons', this)">إضافات</button>
            <button class="cat-btn" onclick="filterCat('games', this)">ألعاب</button>
        </div>
        <div class="items-scroll-area">
            <div id="itemsGrid" class="items-grid"></div>
        </div>
    </div>

    <!-- قائمة الطلبات: 50% وسكرول داخلي -->
    <div class="cart-side">
        <input type="tel" id="custPhone" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;" placeholder="رقم جوال العميل">
        
        <div class="cart-items-scroll" id="cartList">
            <p style="text-align:center; color:#ccc; margin-top:30px;">السلة فارغة</p>
        </div>

        <div class="cart-footer">
            <div class="summary-box">
                <div class="total-line"><span>الإجمالي:</span><span><span id="grandTotal">0.00</span> ﷼</span></div>
            </div>
            <div class="payment-grid no-print">
                <button class="pay-btn active" onclick="setPayMethod('نقدي', this)">💵 كاش</button>
                <button class="pay-btn" onclick="setPayMethod('شبكة', this)">💳 شبكة</button>
                <button class="pay-btn" onclick="setPayMethod('مختلط', this)">🔄 مختلط</button>
            </div>
            <button class="btn-pay-final no-print" onclick="completeSale()">إتمام و طباعة ✅</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://shahi-walif-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let cart = [], selectedMethod = "نقدي", currentCat = 'tea';

    function syncProducts() {
        db.ref('products').on('value', (s) => {
            const data = s.val();
            window.allProducts = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
            filterCat(currentCat, document.querySelector('.cat-btn.active'));
        });
    }

    function filterCat(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const items = (window.allProducts || []).filter(p => p.cat === cat);
        document.getElementById('itemsGrid').innerHTML = items.map(p => `
            <div class="item-card" onclick="addToCart('${p.name}', ${p.price})">
                <b>${p.name}</b><br><small>${p.price.toFixed(2)} ﷼</small>
            </div>`).join('');
    }

    function addToCart(name, price) {
        const item = cart.find(i => i.name === name);
        if (item) item.qty++; else cart.push({ name, price, qty: 1 });
        renderCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function renderCart() {
        let total = 0;
        const list = document.getElementById('cartList');
        if (cart.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#ccc; margin-top:30px;">السلة فارغة</p>';
        } else {
            list.innerHTML = cart.map((item, index) => {
                total += (item.price * item.qty);
                return `<div class="cart-row"><button class="remove-btn" onclick="removeFromCart(${index})">✕</button><span style="flex:1; margin-right:10px;">${item.name}</span><span>${(item.price * item.qty).toFixed(2)}</span></div>`;
            }).join('');
        }
        document.getElementById('grandTotal').innerText = total.toFixed(2);
        list.scrollTop = list.scrollHeight;
    }

    function setPayMethod(m, btn) {
        selectedMethod = m;
        document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function completeSale() {
        if(cart.length === 0) return;
        db.ref('sales').push({ 
            total: document.getElementById('grandTotal').innerText, 
            payment: selectedMethod, 
            items: cart, 
            timestamp: firebase.database.ServerValue.TIMESTAMP 
        }).then(() => { 
            window.print(); 
            cart = []; 
            renderCart(); 
        });
    }

    window.onload = syncProducts;
</script>
</body>
</html>
