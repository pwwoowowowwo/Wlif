<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كاشير شاهي وليف المطور</title>
    <style>
        :root { --bg: #e0e5ec; --maroon: #800000; --shadow: 1px 1px 3px #bebebe, -1px -1px 3px #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; font-size: 9px; }

        header { height: 25px; background: #1a1c23; color: white; display: flex; align-items: center; padding: 0 10px; justify-content: space-between; font-size: 10px; }

        .tabs-bar { display: flex; background: #cfd4da; padding: 2px 5px 0; gap: 2px; overflow-x: auto; height: 22px; }
        .invoice-tab { padding: 3px 8px; border: none; border-radius: 4px 4px 0 0; background: #bdc3c7; cursor: pointer; font-size: 8px; }
        .invoice-tab.active { background: var(--bg); color: var(--maroon); font-weight: bold; }

        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 4px; gap: 4px; }

        /* القسم الأيمن: المنتجات والكيبورد */
        .menu-side { flex: 2.2; display: flex; flex-direction: column; gap: 4px; }
        
        .numpad { display: flex; gap: 2px; background: white; padding: 3px; border-radius: 6px; box-shadow: var(--shadow); justify-content: center; }
        .num-btn { width: 24px; height: 24px; border-radius: 4px; border: none; background: var(--bg); font-weight: bold; cursor: pointer; font-size: 10px; }
        .num-btn.active { background: var(--maroon); color: white; }

        .category-bar { display: flex; gap: 2px; }
        .cat-btn { flex: 1; padding: 4px; border-radius: 4px; border: none; background: white; box-shadow: var(--shadow); cursor: pointer; font-size: 9px; font-weight: bold; }
        .cat-btn.active { background: var(--maroon); color: white; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 4px; overflow-y: auto; padding: 2px; flex: 1; }
        .item-card { 
            background: white; border-radius: 4px; aspect-ratio: 1 / 1; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border: none; box-shadow: var(--shadow); cursor: pointer; font-size: 8.5px; padding: 2px; line-height: 1.1;
        }
        .item-card b { color: var(--maroon); margin-top: 2px; font-size: 9px; }

        /* القسم الأيسر: السلة المتمددة */
        .cart-side { 
            flex: 1; min-width: 200px; display: flex; flex-direction: column; 
            background: white; border-radius: 8px; box-shadow: var(--shadow); padding: 6px;
            max-height: 100%; /* تمدد السلة */
        }
        .cart-items { 
            flex-grow: 1; overflow-y: auto; /* يسمح بالتمدد والتمرير */
            border-bottom: 1px dashed #ccc; margin-bottom: 5px;
        }
        .cart-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 9px; border-bottom: 1px solid #f9f9f9; }
        
        .totals { padding: 4px 0; background: #fff; }
        .total-row { display: flex; justify-content: space-between; font-size: 9.5px; margin-bottom: 2px; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .pay-btn { grid-column: span 2; background: #28a745; color: white; padding: 10px; border-radius: 6px; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }
        .hold-btn, .new-btn { background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 6px; font-size: 9px; }
        .new-btn { background: #007bff; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; text-align: center; font-size: 10px; }
        }
    </style>
</head>
<body>

<header>
    <span>🍃 شاهي وليف | POS</span>
    <small>فهد مرزوق المخلفي</small>
</header>

<div class="tabs-bar" id="tabsBar"></div>

<div class="main-layout">
    <div class="menu-side">
        <div class="numpad" id="numpad">
            <script>
                for(let i=1; i<=10; i++) document.write(`<button class="num-btn ${i==1?'active':''}" onclick="setQty(${i}, this)">${i}</button>`);
            </script>
        </div>

        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('شاهي', this)">🫖 الشاهي</button>
            <button class="cat-btn" onclick="filterCat('مخبوزات', this)">🥐 المخبوزات</button>
            <button class="cat-btn" onclick="filterCat('جانبي', this)">🍿 إضافات</button>
        </div>

        <div class="items-grid" id="itemsGrid"></div>
    </div>

    <div class="cart-side">
        <div class="cart-items" id="cartContent"></div>
        
        <div class="totals">
            <div class="total-row"><span>المجموع:</span><span id="sub">0.00</span></div>
            <div class="total-row"><span>الضريبة (15%):</span><span id="tax">0.00</span></div>
            <div class="total-row" style="font-weight:bold; font-size:13px; border-top:1px solid #eee; padding-top:4px;">
                <span>الإجمالي:</span><span id="grand">0.00</span>
            </div>
        </div>

        <div class="action-grid">
            <button class="hold-btn" onclick="holdInvoice()">⏸ تعليق</button>
            <button class="new-btn" onclick="newInvoice()">➕ جديدة</button>
            <button class="pay-btn" onclick="processPayment()">✅ دفع وطباعة</button>
        </div>
    </div>
</div>

<div id="print-area" style="display:none"></div>

<script>
    // قائمة الأصناف بأسماء دقيقة لمحل شاهي وليف
    const allProducts = [
        {name: "شاهي أحمر ص", price: 2, cat: "شاهي"}, {name: "شاهي أحمر و", price: 4, cat: "شاهي"}, {name: "شاهي أحمر ز", price: 6, cat: "شاهي"},
        {name: "شاهي وليف ص", price: 2, cat: "شاهي"}, {name: "شاهي وليف و", price: 4, cat: "شاهي"}, {name: "شاهي وليف ز", price: 6, cat: "شاهي"},
        {name: "شاهي مدخن ص", price: 2, cat: "شاهي"}, {name: "شاهي مدخن و", price: 4, cat: "شاهي"}, {name: "شاهي مدخن ز", price: 6, cat: "شاهي"},
        {name: "كرك", price: 5, cat: "شاهي"}, {name: "أتاي مغربي", price: 5, cat: "شاهي"}, {name: "زنجبيل ليمون", price: 5, cat: "شاهي"},
        {name: "برادي شاهي", price: 12, cat: "شاهي"}, {name: "برادي أخضر", price: 12, cat: "شاهي"},
        {name: "فطيرة 4 أجبان", price: 12, cat: "مخبوزات"}, {name: "جبنة سائلة", price: 8, cat: "مخبوزات"}, {name: "لبنة", price: 8, cat: "مخبوزات"},
        {name: "شيدر", price: 8, cat: "مخبوزات"}, {name: "نحل كلاسيك", price: 15, cat: "مخبوزات"}, {name: "نحل قرفة", price: 16, cat: "مخبوزات"},
        {name: "مكسرات علبة", price: 5, cat: "جانبي"}, {name: "مكسرات يد", price: 5, cat: "جانبي"}, {name: "رغيفة سمسم", price: 2, cat: "جانبي"}, 
        {name: "بسكوت مالح", price: 2, cat: "جانبي"}, {name: "ماء", price: 1, cat: "جانبي"}
    ];

    let currentQty = 1;
    let invoices = { "1": [] };
    let activeInv = "1";

    function setQty(n, btn) {
        currentQty = n;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = allProducts.filter(p => p.cat === cat);
        document.getElementById('itemsGrid').innerHTML = filtered.map(p => `
            <button class="item-card" onclick="addToCart('${p.name}', ${p.price})">
                <span>${p.name}</span> <b>${p.price} ﷼</b>
            </button>`).join('');
    }

    function addToCart(name, price) {
        for(let i=0; i<currentQty; i++) invoices[activeInv].push({name, price});
        updateUI();
    }

    function updateUI() {
        const content = document.getElementById('cartContent');
        content.innerHTML = invoices[activeInv].length ? invoices[activeInv].map((item, idx) => `
            <div class="cart-row"><span>${item.name}</span> <span>${item.price} <button onclick="remove(${idx})" style="border:none; color:red; background:none; padding:0 2px;">✕</button></span></div>
        `).join('') : '<div style="text-align:center; padding-top:15px; color:#999">السلة فارغة</div>';
        
        let sub = invoices[activeInv].reduce((s, i) => s + i.price, 0);
        let tax = sub * 0.15; // الضريبة 15%
        document.getElementById('sub').innerText = sub.toFixed(2);
        document.getElementById('tax').innerText = tax.toFixed(2);
        document.getElementById('grand').innerText = (sub + tax).toFixed(2);
        renderTabs();
    }

    function remove(idx) { invoices[activeInv].splice(idx, 1); updateUI(); }

    function newInvoice() {
        let id = (Object.keys(invoices).length + 1).toString();
        invoices[id] = [];
        activeInv = id;
        updateUI();
    }

    function holdInvoice() { newInvoice(); }

    function renderTabs() {
        document.getElementById('tabsBar').innerHTML = Object.keys(invoices).map(id => `
            <button class="invoice-tab ${activeInv==id?'active':''}" onclick="activeInv='${id}'; updateUI()">طلب ${id}</button>
        `).join('');
    }

    function processPayment() {
        if(invoices[activeInv].length === 0) return;
        const total = document.getElementById('grand').innerText;
        let printHTML = `<h4>شاهي وليف</h4><p>فاتورة رقم: ${activeInv}</p><hr>`;
        invoices[activeInv].forEach(i => printHTML += `<div style="display:flex; justify-content:space-between"><span>${i.name}</span><span>${i.price}</span></div>`);
        printHTML += `<hr><b>الإجمالي شامل الضريبة: ${total} ﷼</b>`;
        document.getElementById('print-area').innerHTML = printHTML;
        window.print();
        delete invoices[activeInv];
        if(Object.keys(invoices).length === 0) invoices["1"] = [];
        activeInv = Object.keys(invoices)[0];
        updateUI();
    }

    window.onload = () => filterCat('شاهي', document.querySelector('.cat-btn'));
</script>
</body>
</html>
