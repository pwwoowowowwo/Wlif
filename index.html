<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كاشير شاهي وليف - المنيو الكامل</title>
    <style>
        :root { --maroon: #630000; --gold: #c5a059; --bg: #f4f4f2; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { height: 45px; background: var(--maroon); color: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; }
        .report-btn { background: var(--gold); border: none; padding: 5px 12px; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; }
        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        .menu-side { flex: 3; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .category-bar { display: flex; gap: 5px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 5px; overflow-x: auto; }
        .cat-btn { padding: 10px 15px; border-radius: 6px; border: 1px solid #ddd; font-weight: bold; cursor: pointer; background: white; white-space: nowrap; }
        .cat-btn.active { background: var(--maroon); color: white; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .item-card { background: white; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #ddd; cursor: pointer; text-align: center; }
        .item-card b { color: var(--maroon); font-size: 15px; margin-top: 5px; }
        .cart-side { flex: 1.2; min-width: 280px; background: white; border-radius: 12px; display: flex; flex-direction: column; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .cart-items-container { height: 35%; overflow-y: auto; border-bottom: 2px solid #f0f0f0; margin-bottom: 10px; }
        .cart-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .numpad-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .num-btn { padding: 12px; background: #f8f9fa; border: 1px solid #eee; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .num-btn.active { background: var(--maroon); color: white; }
        .payment-box { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .pay-btn { padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-weight: bold; }
        .pay-btn.active { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
        .totals-area { background: #fff8f8; padding: 10px; border-radius: 8px; border: 1px solid #ffebeb; margin-bottom: 10px; }
        .total-line { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; }
        .final-price { font-size: 24px; font-weight: bold; color: var(--maroon); text-align: center; border-top: 2px solid #ffdcdc; padding-top: 8px; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-pay { grid-column: span 2; background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-hold { background: #f57c00; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-new { background: #1976d2; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }
        #reportModal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:90%; max-width:400px; padding:20px; border-radius:12px; box-shadow:0 0 20px rgba(0,0,0,0.3); z-index:100; border-top:10px solid var(--maroon); }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:99; }
        @media print {
            body * { visibility: hidden; }
            #receipt, #receipt * { visibility: visible; }
            #receipt { position: absolute; left: 0; top: 0; width: 80mm; padding: 5mm; text-align: center; }
            .r-line { display: flex; justify-content: space-between; margin: 3px 0; font-size: 12px; }
        }
    </style>
</head>
<body>

<header>
    <span>🍃 شاهي وليف | الرقم الضريبي: 310071502100003</span>
    <button class="report-btn" onclick="showReport()">📊 التقرير</button>
</header>

<div class="main-layout">
    <div class="menu-side">
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('tea', this)">شاي</button>
            <button class="cat-btn" onclick="filterCat('karak', this)">كرك/إضافات</button>
            <button class="cat-btn" onclick="filterCat('pot', this)">برادي</button>
            <button class="cat-btn" onclick="filterCat('bakery', this)">مخبوزات</button>
            <button class="cat-btn" onclick="filterCat('sides', this)">جانبية</button>
        </div>
        <div id="itemsGrid" class="items-grid"></div>
    </div>

    <div class="cart-side">
        <div id="invNum" style="text-align:center; font-weight:bold; color:#777; margin-bottom:5px;">فاتورة #1</div>
        <div class="cart-items-container" id="cartList"></div>
        <div class="numpad-box">
            <button class="num-btn active" onclick="setQty(1, this)">1</button>
            <button class="num-btn" onclick="setQty(2, this)">2</button>
            <button class="num-btn" onclick="setQty(3, this)">3</button>
            <button class="num-btn" onclick="setQty(4, this)">4</button>
            <button class="num-btn" onclick="setQty(5, this)">5</button>
            <button class="num-btn" onclick="setQty(6, this)">6</button>
        </div>
        <div class="payment-box">
            <button class="pay-btn active" onclick="setPay('نقدي', this)">💵 نقدي</button>
            <button class="pay-btn" onclick="setPay('شبكة', this)">💳 شبكة</button>
        </div>
        <div class="totals-area">
            <div class="total-line"><span>قبل الضريبة:</span><span id="subTotal">0.00</span></div>
            <div class="total-line"><span>الضريبة (15%):</span><span id="taxAmount">0.00</span></div>
            <div class="final-price"><span id="grandTotal">0.00</span> ﷼</div>
        </div>
        <div class="action-btns">
            <button class="btn-pay" onclick="finishSale()">إنهاء وطباعة ✅</button>
            <button class="btn-hold" onclick="holdInv()">تعليق</button>
            <button class="btn-new" onclick="newOrder()">جديد</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeReport()"></div>
<div id="reportModal">
    <h3 style="text-align:center;">تقرير المبيعات</h3>
    <div id="reportContent"></div>
    <hr>
    <button onclick="clearReport()" style="width:100%; background:red; color:white; padding:10px; border:none; border-radius:6px; cursor:pointer;">تصفير اليوم</button>
</div>

<div id="receipt" style="display:none"></div>

<script>
    const products = [
        // شاي (أحمر، وليف، مدخن، أخضر)
        { name: "شاي احمر صغير", price: 2, cat: "tea" }, { name: "شاي احمر وسط", price: 4, cat: "tea" }, { name: "شاي احمر زجاج", price: 6, cat: "tea" },
        { name: "شاي وليف صغير", price: 2, cat: "tea" }, { name: "شاي وليف وسط", price: 4, cat: "tea" }, { name: "شاي وليف زجاج", price: 6, cat: "tea" },
        { name: "شاي مدخن صغير", price: 2, cat: "tea" }, { name: "شاي مدخن وسط", price: 4, cat: "tea" }, { name: "شاي مدخن زجاج", price: 6, cat: "tea" },
        { name: "شاي اخضر صغير", price: 2, cat: "tea" }, { name: "شاي اخضر وسط", price: 4, cat: "tea" }, { name: "شاي اخضر زجاج", price: 6, cat: "tea" },
        // كرك
        { name: "كرك", price: 5, cat: "karak" }, { name: "اتاي", price: 5, cat: "karak" }, { name: "زنجبيل وليمون", price: 5, cat: "karak" },
        // برادي
        { name: "برادي شاي", price: 12, cat: "pot" }, { name: "برادي اخضر", price: 12, cat: "pot" },
        // مخبوزات
        { name: "فطيرة مكس 4 اجبان", price: 12, cat: "bakery" }, { name: "فطيرة جبنة سائلة", price: 8, cat: "bakery" },
        { name: "فطيرة لبنة", price: 8, cat: "bakery" }, { name: "فطيرة شيدر", price: 8, cat: "bakery" },
        { name: "خلية نحل كلاسيك", price: 15, cat: "bakery" }, { name: "خلية نحل قرفة", price: 16, cat: "bakery" },
        // جانبية
        { name: "مكسرات عربية", price: 5, cat: "sides" }, { name: "مكسرات يابانية", price: 5, cat: "sides" },
        { name: "رغيفة سمسم", price: 2, cat: "sides" }, { name: "بسكويت مالح", price: 2, cat: "sides" }, { name: "ماء", price: 1, cat: "sides" }
    ];

    let cart = [], currentQty = 1, payMethod = "نقدي";
    let invCounter = localStorage.getItem('invNum') || 1;
    let salesData = JSON.parse(localStorage.getItem('sales')) || [];

    function setQty(n, btn) {
        currentQty = n;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setPay(m, btn) {
        payMethod = m;
        document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('itemsGrid').innerHTML = products.filter(p => p.cat === cat).map(p => `
            <div class="item-card" onclick="addToCart('${p.name}', ${p.price})">
                <span>${p.name}</span><b>${p.price} ﷼</b>
            </div>`).join('');
    }

    function addToCart(name, price) {
        for(let i=0; i<currentQty; i++) cart.push({name, price});
        render();
    }

    function render() {
        document.getElementById('cartList').innerHTML = cart.map((item, i) => `
            <div class="cart-row"><span>${item.name}</span><span>${item.price.toFixed(2)} <small onclick="cart.splice(${i},1);render()" style="color:red;cursor:pointer">✕</small></span></div>
        `).join('');
        let sub = cart.reduce((s, i) => s + i.price, 0);
        let tax = sub * 0.15;
        document.getElementById('subTotal').innerText = sub.toFixed(2);
        document.getElementById('taxAmount').innerText = tax.toFixed(2);
        document.getElementById('grandTotal').innerText = (sub + tax).toFixed(2);
    }

    function finishSale() {
        if(cart.length === 0) return;
        let total = parseFloat(document.getElementById('grandTotal').innerText);
        salesData.push({ total, method: payMethod });
        localStorage.setItem('sales', JSON.stringify(salesData));
        
        let html = `<h3>شاهي وليف 🍃</h3><p>الرقم الضريبي: 310071502100003</p><hr>`;
        cart.forEach(i => html += `<div class="r-line"><span>${i.name}</span><span>${i.price.toFixed(2)}</span></div>`);
        html += `<hr><div class="r-line"><b>الإجمالي</b><b>${total.toFixed(2)} ﷼</b></div><p>طريقة الدفع: ${payMethod}</p>`;
        document.getElementById('receipt').innerHTML = html;
        window.print();
        newOrder();
    }

    function holdInv() { if(cart.length > 0) { alert("تم تعليق الفاتورة #" + invCounter); newOrder(); } }

    function newOrder() {
        cart = []; invCounter++;
        localStorage.setItem('invNum', invCounter);
        document.getElementById('invNum').innerText = "فاتورة #" + invCounter;
        render();
    }

    function showReport() {
        let total = salesData.reduce((s, r) => s + r.total, 0);
        let cash = salesData.filter(r => r.method === "نقدي").reduce((s, r) => s + r.total, 0);
        let card = salesData.filter(r => r.method === "شبكة").reduce((s, r) => s + r.total, 0);
        document.getElementById('reportContent').innerHTML = `
            <p>المجموع الكلي: ${total.toFixed(2)} ﷼</p>
            <p style="color:green">كاش: ${cash.toFixed(2)} ﷼</p>
            <p style="color:blue">شبكة: ${card.toFixed(2)} ﷼</p>
        `;
        document.getElementById('reportModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeReport() { document.getElementById('reportModal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function clearReport() { if(confirm("تصفير مبيعات اليوم؟")) { salesData = []; localStorage.setItem('sales', "[]"); showReport(); } }

    window.onload = () => filterCat('tea', document.querySelector('.cat-btn'));
</script>
</body>
</html>
