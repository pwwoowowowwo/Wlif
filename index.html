<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاهي وليف - النسخة المعتمدة</title>
    <style>
        :root { 
            --bg: #e0e5ec;
            --shadow-out: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
            --shadow-in: inset 6px 6px 12px #a3b1c6, inset -6px -6px 12px #ffffff;
            --maroon: #800000;
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        /* الترويسة */
        .header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            color: var(--maroon);
            font-weight: 900;
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        /* حاوية النظام */
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            padding: 20px;
            justify-content: center;
            max-width: 1000px;
        }

        /* تأثير النيومورفيزم الأساسي */
        .neu-card {
            background: var(--bg);
            border-radius: 30px;
            box-shadow: var(--shadow-out);
            padding: 20px;
            border: none;
        }

        /* الأصناف (المنغمسة عند الضغط) */
        .product-btn {
            width: 120px;
            height: 120px;
            margin: 10px;
            border-radius: 20px;
            background: var(--bg);
            box-shadow: var(--shadow-out);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #444;
        }

        .product-btn:active, .neu-btn:active, .tab.active {
            box-shadow: var(--shadow-in);
            transform: scale(0.97);
        }

        .menu-section {
            max-width: 320px;
            text-align: center;
        }

        /* السلة المحمية */
        .cart-section {
            width: 350px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .screen {
            background: var(--bg);
            box-shadow: var(--shadow-in);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            flex-grow: 1;
            min-height: 150px;
            overflow-y: auto;
        }

        .total-display {
            font-size: 32px;
            font-weight: 900;
            color: var(--maroon);
            text-align: center;
            margin: 10px 0;
        }

        /* أزرار التحكم */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .neu-btn {
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: var(--bg);
            box-shadow: var(--shadow-out);
            font-weight: bold;
            cursor: pointer;
            color: #444;
            transition: 0.2s;
        }

        .btn-pay { color: #059669; }
        .btn-hold { color: #d97706; }
        .btn-clear { color: #dc2626; }

        /* تابات التعليق */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            overflow-x: auto;
            width: 100%;
            justify-content: center;
            padding: 10px;
        }
        .tab {
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: var(--shadow-out);
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.2s;
            background: var(--bg);
        }
        .tab.active { color: var(--maroon); }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px inset rgba(0,0,0,0.05);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">🍃 شاهي وليف</div>

    <div id="tab-bar" class="tabs"></div>

    <div class="container">
        <div class="menu-section">
            <div id="product-list">
                </div>
        </div>

        <div class="cart-section neu-card">
            <div class="total-display" id="total-val">0.00 ﷼</div>
            <div class="screen" id="cart-content"></div>
            
            <div class="controls">
                <button class="neu-btn btn-pay" onclick="pay('كاش')">💵 كاش</button>
                <button class="neu-btn btn-pay" onclick="pay('شبكة')">💳 شبكة</button>
                <button class="neu-btn btn-hold" onclick="holdInvoice()">⏸ تعليق</button>
                <button class="neu-btn btn-clear" onclick="clearCart()">✖ مسح</button>
            </div>
        </div>
    </div>

<script>
    // بيانات المنتجات
    const products = [
        {name: "كرك وليف", price: 3},
        {name: "شاي نعناع", price: 2},
        {name: "فطيرة جبن", price: 5},
        {name: "كرواسون", price: 7},
        {name: "جاكارو", price: 10},
        {name: "ماء", price: 1}
    ];

    // نظام إدارة الفواتير
    let invoices = { 'الرئيسي': [] };
    let activeId = 'الرئيسي';
    let holdCounter = 0;

    // عرض المنتجات
    function renderProducts() {
        const list = document.getElementById('product-list');
        list.innerHTML = products.map(p => `
            <button class="product-btn" onclick="addToCart('${p.name}', ${p.price})">
                <span>${p.name}</span>
                <span style="color:var(--maroon); margin-top:5px;">${p.price} ﷼</span>
            </button>
        `).join('');
    }

    // إضافة للسلة
    function addToCart(name, price) {
        const cart = invoices[activeId];
        const item = cart.find(i => i.name === name);
        if(item) item.qty++; else cart.push({name, price, qty: 1});
        updateUI();
    }

    // تحديث الواجهة
    function updateUI() {
        const content = document.getElementById('cart-content');
        const cart = invoices[activeId];
        
        if(cart.length === 0) {
            content.innerHTML = '<p style="text-align:center; color:#999; margin-top:50px;">السلة فارغة</p>';
        } else {
            content.innerHTML = cart.map(i => `
                <div class="item-row">
                    <span>${i.name} × ${i.qty}</span>
                    <span>${(i.price * i.qty).toFixed(2)} ﷼</span>
                </div>
            `).join('');
        }

        // الحساب الشامل للضريبة 15%
        let total = cart.reduce((s, i) => s + (i.price * i.qty), 0) * 1.15;
        document.getElementById('total-val').innerText = total.toFixed(2) + " ﷼";
        renderTabs();
    }

    // تعليق الفاتورة
    function holdInvoice() {
        if(invoices[activeId].length === 0 && activeId === 'الرئيسي') return;
        holdCounter++;
        const newId = 'طلب ' + holdCounter;
        invoices[newId] = [];
        activeId = newId;
        updateUI();
    }

    // عرض التابات
    function renderTabs() {
        const bar = document.getElementById('tab-bar');
        bar.innerHTML = Object.keys(invoices).map(id => `
            <div class="tab ${activeId === id ? 'active' : ''}" onclick="switchTab('${id}')">
                ${id} ${invoices[id].length > 0 ? '●' : ''}
            </div>
        `).join('');
    }

    function switchTab(id) { activeId = id; updateUI(); }

    // الدفع
    function pay(method) {
        if(invoices[activeId].length === 0) return;
        alert("تم الدفع بنجاح عبر: " + method);
        if(activeId === 'الرئيسي') {
            invoices['الرئيسي'] = []; 
        } else {
            delete invoices[activeId];
            activeId = 'الرئيسي';
        }
        updateUI();
    }

    // مسح السلة
    function clearCart() {
        if(confirm("هل تريد مسح السلة الحالية؟")) {
            invoices[activeId] = [];
            updateUI();
        }
    }

    // التشغيل عند التحميل
    window.onload = () => {
        renderProducts();
        updateUI();
    };
</script>
</body>
</html>
