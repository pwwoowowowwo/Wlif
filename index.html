<script>
    // 1. تأكد أن كل صنف له cat (تصنيف) يطابق الموجود في أزرار التنقل
    let products = [
        {name:"كرك وليف", price:3, cat:"شاهي"},
        {name:"شاي نعناع", price:2, cat:"شاهي"},
        {name:"فطيرة جبن", price:5, cat:"مخبوزات"},
        {name:"كرواسون", price:7, cat:"مخبوزات"},
        {name:"جاكارو", price:10, cat:"ألعاب"},
        {name:"مونوبولي", price:15, cat:"ألعاب"},
        {name:"ماء", price:1, cat:"شاهي"}
    ];

    let cart = [];
    let salesHistory = JSON.parse(localStorage.getItem('salesHistory')) || [];

    // 2. تحديث دالة العرض لضمان ظهور الأصناف عند تشغيل الصفحة
    function renderProducts(filter = 'الكل') {
        const grid = document.getElementById('p-grid');
        if (!grid) return; // تأمين في حال لم يتم تحميل العنصر

        // فلترة الأصناف بناءً على التصنيف المختار
        let filtered = filter === 'الكل' ? products : products.filter(p => p.cat === filter);
        
        grid.innerHTML = filtered.map((p) => {
            // البحث عن مكان المنتج الأصلي في المصفوفة لإضافته للسلة بشكل صحيح
            let originalIdx = products.findIndex(item => item.name === p.name);
            return `
                <div class="product" onclick="addToCart('${p.name}')">
                    <strong>${p.name}</strong><br>
                    <b style="color:var(--maroon)">${p.price.toFixed(2)} ر.س</b>
                </div>
            `;
        }).join('');

        // تحديث شكل أزرار التصنيفات
        updateCatButtons(filter);
    }

    function updateCatButtons(activeCat) {
        // إذا كان عندك أزرار تصنيفات، هذا الكود يضيف لها شكل "الضغط"
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.innerText.includes(activeCat)) btn.classList.add('active');
        });
    }

    // 3. دالة إضافة للسلة محسنة
    function addToCart(name) {
        const p = products.find(item => item.name === name);
        const existing = cart.find(item => item.name === name);
        if(existing) {
            existing.qty++;
        } else {
            cart.push({...p, qty: 1});
        }
        updateUI();
    }

    // تشغيل العرض فور تحميل الصفحة
    window.onload = function() {
        renderProducts('الكل');
        updateUI();
    };
</script>
