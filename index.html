<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشير شاهي وليف - نظام التصنيفات</title>
    <style>
        :root { 
            --primary: #4f46e5; --dark: #111827; --bg: #e5e7eb;
            --maroon: #800000; --success: #059669; --warning: #d97706; --danger: #dc2626;
            --shadow-out: 6px 6px 12px #bebebe, -6px -6px 12px #ffffff;
            --shadow-in: inset 5px 5px 10px #bebebe, inset -5px -5px 10px #ffffff;
        }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; overflow-y: auto; }

        .topbar { display: flex; justify-content: space-between; align-items: center; background: var(--dark); color: white; padding: 0 20px; height: 55px; position: sticky; top: 0; z-index: 1000; }
        .tabs-bar { display: flex; background: #d1d5db; padding: 5px 15px 0; gap: 8px; overflow-x: auto; position: sticky; top: 55px; z-index: 999; }
        .tab { padding: 10px 20px; border-radius: 12px 12px 0 0; background: #9ca3af; cursor: pointer; font-weight: bold; font-size: 13px; border: none; white-space: nowrap; }
        .tab.active { background: var(--bg); color: var(--maroon); box-shadow: 0 -3px 6px rgba(0,0,0,0.1); }

        /* شريط التصنيفات الجديد */
        .categories-bar { 
            display: flex; gap: 10px; padding: 15px; overflow-x: auto; 
            background: var(--bg); position: sticky; top: 98px; z-index: 997;
            border-bottom: 2px solid var(--maroon);
        }
        .cat-btn { 
            padding: 10px 20px; border-radius: 15px; border: none; background: var(--bg); 
            box-shadow: var(--shadow-out); cursor: pointer; font-weight: bold; color: var(--dark);
            white-space: nowrap; transition: 0.2s;
        }
        .cat-btn.active { box-shadow: var(--shadow-in); color: var(--maroon); }

        .main-content { display: flex; flex-wrap: wrap; padding: 15px; gap: 20px; align-items: flex-start; }

        .pos-container { flex: 1.5; min-width: 320px; background: var(--bg); border-radius: 25px; box-shadow: var(--shadow-out); padding: 15px; border: 2px solid var(--maroon); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 12px; padding: 10px; }
        
        .product { background: white; padding: 20px 5px; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: var(--shadow-out); transition: 0.2s; border: 1px solid #eee; }
        .product:active { box-shadow: var(--shadow-in); transform: scale(0.95); }

        .cart-section { flex: 1; min-width: 340px; background: var(--bg); border-radius: 25px; box-shadow: var(--shadow-out); padding: 20px; display: flex; flex-direction: column; height: auto; }
        .cart-items { margin-bottom: 20px; border-radius: 15px; box-shadow: var(--shadow-in); padding: 12px; background: #f9fafb; min-height: 100px; }
        .cart-row { background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }

        .summary-box { background: var(--bg); padding: 15px; border-radius: 20px; text-align: center; box-shadow: var(--shadow-in); margin-bottom: 15px; border-right: 5px solid var(--maroon); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 16px; border: none; border-radius: 18px; color: white; font-weight: bold; cursor: pointer; box-shadow: var(--shadow-out); font-size: 15px; }
        .btn:active { box-shadow: var(--shadow-in); }
        
        .btn-cash { background: var(--success); }
        .btn-card { background: var(--primary); }
        .btn-hold { background: var(--warning); }
        .btn-void { background: var(--danger); }

        .qty-badge { background: var(--maroon); color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 8px; }

        @media (max-width: 768px) { .main-content { flex-direction: column; } .cart-section { width: 100%; } }
    </style>
</head>
<body>

    <div class="topbar">
        <h3 style="margin:0;">🍃 شاهي وليف</h3>
        <div id="order-info" style="font-size: 13px; opacity: 0.8;">الفاتورة الرئيسية</div>
    </div>

    <div class="tabs-bar" id="tabs-container"></div>

    <div class="categories-bar" id="cat-bar">
        <button class="cat-btn active" onclick="filterCat('الكل')">الكل</button>
        <button class="cat-btn" onclick="filterCat('شاهي')">☕ شاهي</button>
        <button class="cat-btn" onclick="filterCat('مخبوزات')">🥐 مخبوزات</button>
        <button class="cat-btn" onclick="filterCat('ألعاب')">🎲 ألعاب</button>
    </div>

    <div class="main-content">
        <div class="pos-container">
            <div class="products-grid" id="p-grid"></div>
        </div>

        <div class="cart-section">
            <h4 style="margin:0 0 15px 0; color: var(--maroon); font-size: 18px;">🛒 طلبات الوليـف</h4>
            <div id="cart-list" class="cart-items"></div>
            
            <div class="summary-box">
                <small>الإجمالي النهائي (شامل الضريبة)</small>
                <div id="total" style="font-size: 2.2rem; font-weight: 900; color: var(--maroon);">0.00</div>
            </div>

            <div class="btn-grid">
                <button class="btn btn-cash" onclick="pay('كاش')">💵 كاش</button>
                <button class="btn btn-card" onclick="pay('شبكة')">💳 شبكة</button>
                <button class="btn btn-hold" onclick="holdInvoice()">⏸ تعليق</button>
                <button class="btn btn-void" onclick="clearCart()">✖ كنسلة</button>
            </div>
        </div>
    </div>

<script>
    // إضافة تصنيف لكل صنف
    let products = [
        {name:"كرك وليف", price:3, cat:"شاهي"},
        {name:"شاي نعناع", price:2, cat:"شاهي"},
        {name:"فطيرة جبن", price:5, cat:"مخبوزات"},
        {name:"كرواسون", price:7, cat:"مخبوزات"},
        {name:"جاكارو", price:10, cat:"ألعاب"},
        {name:"مونوبولي", price:15, cat:"ألعاب"},
        {name:"ماء", price:1, cat:"شاهي"}
    ];

    let currentCat = "الكل";
    let invoices = { 'main': [] };
    let activeInvoice = 'main';
    let holdCount = 0;

    function renderProducts() {
        let grid = document.getElementById('p-grid');
        let filtered = currentCat === "الكل" ? products : products.filter(p => p.cat === currentCat);
        
        grid.innerHTML = filtered.map((p, i) => {
            // نمرر الـ index الأصلي للمنتج في مصفوفة products الأصلية
            let originalIndex = products.findIndex(item => item.name === p.name);
            return `
                <div class="product" onclick="addToCart(${originalIndex})">
                    <strong>${p.name}</strong><br><b>${p.price} ر.س</b>
                </div>
            `;
        }).join('');
    }

    function filterCat(cat) {
        currentCat = cat;
        // تحديث شكل الأزرار
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.includes(cat) || (cat === "الكل" && btn.innerText === "الكل")) btn.classList.add('active');
        });
        renderProducts();
    }

    function addToCart(idx) {
        let cart = invoices[activeInvoice];
        let p = products[idx];
        let existing = cart.find(item => item.name === p.name);
        if (existing) { existing.qty++; } 
        else { cart.push({...p, qty: 1}); }
        updateUI();
    }

    function updateUI() {
        let list = document.getElementById('cart-list');
        let cart = invoices[activeInvoice];
        list.innerHTML = cart.length ? cart.map((item, i) => `
            <div class="cart-row">
                <span><span class="qty-badge">${item.qty}</span> ${item.name}</span>
                <button onclick="removeItem(${i})" style="border:none; color:var(--danger); background:none; font-weight:bold; cursor:pointer;">✖</button>
            </div>
        `).join('') : '<p style="text-align:center; color:#999; padding:20px;">اختر من القائمة..</p>';
        let total = cart.reduce((s, i) => s + (i.price * i.qty), 0) * 1.15;
        document.getElementById('total').innerText = total.toFixed(2);
        updateTabs();
    }

    // باقي الوظائف (مسح، حذف، تعليق) كما هي في التصميم المعتمد...
    function removeItem(idx) {
        let cart = invoices[activeInvoice];
        if (cart[idx].qty > 1) { cart[idx].qty--; } 
        else { cart.splice(idx, 1); }
        updateUI();
    }

    function holdInvoice() {
        holdCount++;
        let newId = 'hold-' + holdCount;
        invoices[newId] = [];
        activeInvoice = newId;
        updateUI();
    }

    function switchInvoice(id) {
        activeInvoice = id;
        document.getElementById('order-info').innerText = id === 'main' ? 'الفاتورة الرئيسية' : 'طلب معلق #' + id.split('-')[1];
        updateUI();
    }

    function updateTabs() {
        let container = document.getElementById('tabs-container');
        container.innerHTML = Object.keys(invoices).map(id => `
            <div class="tab ${activeInvoice === id ? 'active' : ''}" onclick="switchInvoice('${id}')">
                ${id === 'main' ? 'الرئيسية' : 'طلب ' + id.split('-')[1]}
                ${invoices[id].length > 0 ? '🟢' : ''}
            </div>
        `).join('');
    }

    function pay(type) {
        if(invoices[activeInvoice].length === 0) return;
        alert(`تم تنفيذ العملية ${type}`);
        if(activeInvoice === 'main') { invoices['main'] = []; } 
        else { delete invoices[activeInvoice]; activeInvoice = 'main'; }
        updateUI();
    }

    function clearCart() { if(confirm("تفريغ؟")) { invoices[activeInvoice] = []; updateUI(); } }
    
    renderProducts();
    updateUI();
</script>
</body>
</html>
