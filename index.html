<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام شاهي وليف برو</title>
    <style>
        :root { 
            --primary: #4f46e5; --dark: #111827; --bg: #e5e7eb;
            --maroon: #800000; --success: #059669; --warning: #d97706; --danger: #dc2626;
            --shadow-out: 5px 5px 10px #bebebe, -5px -5px 10px #ffffff;
            --shadow-in: inset 5px 5px 10px #bebebe, inset -5px -5px 10px #ffffff;
        }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; overflow-x: hidden; }

        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 2000; display: flex; align-items: center; justify-content: center; color: white; }
        .login-card { background: #1f2937; padding: 30px; border-radius: 25px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; text-align: center; }

        /* الترويسة */
        .topbar { display: flex; justify-content: center; align-items: center; background: var(--dark); color: white; height: 70px; position: sticky; top: 0; z-index: 1000; }
        .topbar h1 { margin: 0; font-size: 24px; font-weight: 900; }
        .user-info { position: absolute; left: 15px; font-size: 12px; color: #aaa; }

        /* التنقل */
        .navbar { display: flex; justify-content: space-around; padding: 10px; background: var(--bg); box-shadow: var(--shadow-out); margin: 10px; border-radius: 20px; }
        .nav-item { border: none; background: none; cursor: pointer; padding: 10px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--dark); min-width: 55px; }
        .nav-item.active { box-shadow: var(--shadow-in); color: var(--maroon); }

        /* الصفحات */
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الكاشير */
        .cashier-layout { display: flex; flex-wrap: wrap; gap: 20px; }
        .pos-container { flex: 1.5; min-width: 320px; background: var(--bg); border-radius: 25px; box-shadow: var(--shadow-out); padding: 15px; border: 2px solid var(--maroon); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .product { background: white; padding: 15px 5px; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: var(--shadow-out); border: 1px solid #eee; }
        .product:active { box-shadow: var(--shadow-in); }

        /* السلة */
        .cart-section { flex: 1; min-width: 340px; background: var(--bg); border-radius: 25px; box-shadow: var(--shadow-out); padding: 20px; }
        .cart-items { margin-bottom: 15px; border-radius: 15px; box-shadow: var(--shadow-in); padding: 10px; background: #f9fafb; max-height: 300px; overflow-y: auto; }
        .cart-row { background: white; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        .summary-box { background: var(--bg); padding: 15px; border-radius: 20px; box-shadow: var(--shadow-in); margin-bottom: 15px; border-right: 5px solid var(--maroon); }
        .total-line { font-weight: 900; font-size: 24px; color: var(--maroon); border-top: 1px solid #ccc; margin-top: 8px; padding-top: 8px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 15px; border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; box-shadow: var(--shadow-out); }
        .btn:active { box-shadow: var(--shadow-in); }

        /* الجداول */
        .data-table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: var(--shadow-out); margin-top: 15px; }
        .data-table th { background: var(--maroon); color: white; padding: 12px; }
        .data-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }

        /* الطباعة */
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 80mm; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>🍃 شاهي وليف</h2>
        <p>نظام الإدارة المتكامل</p>
        <input type="password" id="pin" placeholder="أدخل رقم السر (1234 للمدير / 0000 للكاشير)">
        <button class="btn" style="background:var(--maroon); width: 100%;" onclick="login()">دخول</button>
    </div>
</div>

<div class="topbar">
    <div class="user-info" id="user-display"></div>
    <h1>شاهي وليف برو</h1>
</div>

<nav class="navbar" id="main-nav" style="display:none;">
    <button class="nav-item active" onclick="showPage('cashier', this)"><i>🏪</i><span>الكاشير</span></button>
    <button class="nav-item admin-only" onclick="showPage('inventory', this)"><i>📦</i><span>الأصناف</span></button>
    <button class="nav-item" onclick="showPage('history', this)"><i>📄</i><span>السجل</span></button>
    <button class="nav-item admin-only" onclick="showPage('reports', this)"><i>📊</i><span>التقارير</span></button>
    <button class="nav-item" onclick="location.reload()"><i>🚪</i><span>خروج</span></button>
</nav>

<div id="cashier" class="page active">
    <div class="cashier-layout">
        <div class="pos-container">
            <div class="products-grid" id="p-grid"></div>
        </div>
        <div class="cart-section">
            <div id="cart-list" class="cart-items"></div>
            <div class="summary-box">
                <div class="total-line"><span>الإجمالي:</span> <span id="total">0.00</span> ﷼</div>
            </div>
            <div class="btn-grid">
                <button class="btn" style="background:var(--success)" onclick="pay('كاش')">كاش</button>
                <button class="btn" style="background:var(--primary)" onclick="pay('شبكة')">شبكة</button>
                <button class="btn" style="background:var(--warning)" onclick="printInvoice()">🖨 طباعة</button>
                <button class="btn" style="background:var(--danger)" onclick="clearCart()">مسح</button>
            </div>
        </div>
    </div>
</div>

<div id="inventory" class="page">
    <div class="summary-box">
        <h4>إضافة صنف جديد</h4>
        <input type="text" id="p-name" placeholder="اسم الصنف">
        <input type="number" id="p-price" placeholder="السعر">
        <button class="btn" style="background:var(--success); margin-top:10px;" onclick="addNewProduct()">إضافة للمنيو</button>
    </div>
    <table class="data-table">
        <thead><tr><th>الصنف</th><th>السعر</th><th>إجراء</th></tr></thead>
        <tbody id="inventory-list"></tbody>
    </table>
</div>

<div id="reports" class="page">
    <div class="btn-grid" style="margin-bottom: 20px;">
        <div class="summary-box"><h3>صافي الدخل</h3><h2 id="rep-total">0 ﷼</h2></div>
        <div class="summary-box"><h3>عدد الفواتير</h3><h2 id="rep-count">0</h2></div>
    </div>
    <button class="btn" style="background:var(--danger); width:100%" onclick="resetAllData()">⚠️ تصغير السجل (مسح البيانات)</button>
</div>

<div id="history" class="page">
    <table class="data-table">
        <thead><tr><th>رقم</th><th>الوقت</th><th>المبلغ</th><th>النوع</th></tr></thead>
        <tbody id="history-list"></tbody>
    </table>
</div>

<div id="print-area" style="display:none; text-align:center; font-family:monospace;">
    <h3>شاهي وليف</h3>
    <p id="print-time"></p>
    <hr>
    <div id="print-items"></div>
    <hr>
    <h2 id="print-total"></h2>
    <p>شكراً لزيارتكم</p>
    <div id="print-qr"></div>
</div>

<script>
    let userRole = 'cashier';
    let products = JSON.parse(localStorage.getItem('sl_products')) || [
        {name:"كرك وليف", price:3}, {name:"شاي نعناع", price:2}, {name:"فطيرة جبن", price:5}
    ];
    let cart = [];
    let sales = JSON.parse(localStorage.getItem('sl_sales')) || [];

    function login() {
        const pin = document.getElementById('pin').value;
        if(pin === '1234') { userRole = 'admin'; }
        else if(pin === '0000') { userRole = 'cashier'; }
        else { alert('رقم خاطئ'); return; }

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-nav').style.display = 'flex';
        document.getElementById('user-display').innerText = 'المستخدم: ' + (userRole === 'admin' ? 'المدير' : 'كاشير');
        
        if(userRole !== 'admin') {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        }
        renderProducts();
    }

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'inventory') renderInventory();
        if(id === 'reports') updateReports();
        if(id === 'history') renderHistory();
    }

    function renderProducts() {
        const grid = document.getElementById('p-grid');
        grid.innerHTML = products.map(p => `
            <div class="product" onclick="addToCart('${p.name}')">
                <strong>${p.name}</strong><br><b>${p.price} ﷼</b>
            </div>
        `).join('');
    }

    function addToCart(name) {
        const p = products.find(x => x.name === name);
        const item = cart.find(x => x.name === name);
        if(item) item.qty++; else cart.push({...p, qty:1});
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        list.innerHTML = cart.map(i => `
            <div class="cart-row"><span>${i.name} × ${i.qty}</span><span>${(i.price*i.qty).toFixed(2)} ﷼</span></div>
        `).join('');
        let total = cart.reduce((s, i) => s + (i.price*i.qty), 0) * 1.15;
        document.getElementById('total').innerText = total.toFixed(2);
    }

    function pay(method) {
        if(cart.length === 0) return;
        let total = document.getElementById('total').innerText;
        sales.push({ id: Date.now(), time: new Date().toLocaleString('ar-SA'), total: total, method: method });
        localStorage.setItem('sl_sales', JSON.stringify(sales));
        alert('تم الحفظ بنجاح');
        cart = []; updateUI();
    }

    function renderInventory() {
        const list = document.getElementById('inventory-list');
        list.innerHTML = products.map((p, i) => `
            <tr><td>${p.name}</td><td>${p.price} ﷼</td><td><button onclick="deleteProduct(${i})" style="color:red">حذف</button></td></tr>
        `).join('');
    }

    function addNewProduct() {
        const name = document.getElementById('p-name').value;
        const price = parseFloat(document.getElementById('p-price').value);
        if(name && price) {
            products.push({name, price});
            localStorage.setItem('sl_products', JSON.stringify(products));
            renderInventory(); renderProducts();
            document.getElementById('p-name').value = ''; document.getElementById('p-price').value = '';
        }
    }

    function deleteProduct(i) {
        products.splice(i, 1);
        localStorage.setItem('sl_products', JSON.stringify(products));
        renderInventory(); renderProducts();
    }

    function updateReports() {
        let total = sales.reduce((s, i) => s + parseFloat(i.total), 0);
        document.getElementById('rep-total').innerText = total.toFixed(2) + " ﷼";
        document.getElementById('rep-count').innerText = sales.length;
    }

    function renderHistory() {
        document.getElementById('history-list').innerHTML = sales.map(s => `
            <tr><td>#${s.id.toString().slice(-4)}</td><td>${s.time.split(' ')[1]}</td><td>${s.total} ﷼</td><td>${s.method}</td></tr>
        `).reverse().join('');
    }

    function printInvoice() {
        if(cart.length === 0) return;
        document.getElementById('print-time').innerText = new Date().toLocaleString();
        document.getElementById('print-items').innerHTML = cart.map(i => `<p>${i.name} x ${i.qty} : ${(i.price*i.qty)} ﷼</p>`).join('');
        document.getElementById('print-total').innerText = "الإجمالي: " + document.getElementById('total').innerText + " ﷼";
        window.print();
    }

    function resetAllData() {
        if(confirm('هل تريد مسح السجل المالي بالكامل؟')) {
            sales = []; localStorage.setItem('sl_sales', JSON.stringify(sales)); updateReports();
        }
    }
</script>
</body>
</html>
