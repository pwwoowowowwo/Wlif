<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كاشير شاهي وليف Pro</title>
    <style>
        :root { --bg: #e0e5ec; --maroon: #800000; --shadow: 4px 4px 8px #bebebe, -4px -4px 8px #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* الترويسة */
        header { height: 45px; background: #1a1c23; color: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; font-size: 14px; }

        /* نظام الفواتير المعلقة */
        .tabs-bar { display: flex; background: #cfd4da; padding: 3px 10px 0; gap: 4px; overflow-x: auto; }
        .invoice-tab { padding: 6px 15px; border: none; border-radius: 10px 10px 0 0; background: #bdc3c7; cursor: pointer; font-size: 12px; }
        .invoice-tab.active { background: var(--bg); color: var(--maroon); font-weight: bold; }

        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 8px; gap: 8px; }

        /* القسم الأيمن: المنتجات والكيبورد */
        .menu-side { flex: 1.8; display: flex; flex-direction: column; gap: 8px; }
        
        /* كيبورد الأرقام */
        .numpad { display: flex; gap: 4px; background: white; padding: 6px; border-radius: 12px; box-shadow: var(--shadow); justify-content: center; }
        .num-btn { width: 35px; height: 35px; border-radius: 8px; border: none; background: var(--bg); box-shadow: 2px 2px 5px #bebebe; font-weight: bold; cursor: pointer; font-size: 14px; }
        .num-btn.active { background: var(--maroon); color: white; }

        /* تصنيف الأصناف */
        .category-bar { display: flex; gap: 5px; margin-bottom: 5px; }
        .cat-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: white; box-shadow: var(--shadow); cursor: pointer; font-size: 13px; font-weight: bold; }
        .cat-btn.active { background: var(--maroon); color: white; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; overflow-y: auto; padding: 5px; flex: 1; }
        .item-card { background: white; border-radius: 12px; padding: 12px 5px; text-align: center; border: none; box-shadow: var(--shadow); cursor: pointer; font-size: 12px; }
        .item-card b { display: block; color: var(--maroon); margin-top: 4px; }

        /* القسم الأيسر: السلة والدفع */
        .cart-side { flex: 1; min-width: 300px; display: flex; flex-direction: column; background: white; border-radius: 15px; box-shadow: var(--shadow); padding: 10px; }
        .cart-items { flex: 1; overflow-y: auto; border-bottom: 1px dashed #ccc; }
        .cart-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f9f9f9; }
        
        .totals { padding: 10px 0; }
        .total-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .pay-btn { grid-column: span 2; background: #28a745; color: white; padding: 15px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .hold-btn { background: #6c757d; color: white; border: none; border-radius: 8px; cursor: pointer; padding: 8px; }
        .new-btn { background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; padding: 8px; }

        /* الطباعة */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; text-align: center; font-size: 12px; }
        }
    </style>
</head>
<body>

<header>
    <span>🍃 شاهي وليف | كاشير ذكي</span>
    <small>الرقم الضريبي: 300012345600003</small>
</header>

<div class="tabs-bar" id="tabsBar"></div>

<div class="main-layout">
    <div class="menu-side">
        <!-- كيبورد الأرقام -->
        <div class="numpad" id="numpad">
            <script>
                for(let i=1; i<=10; i++) document.write(`<button class="num-btn ${i==1?'active':''}" onclick="setQty(${i}, this)">${i}</button>`);
            </script>
        </div>

        <!-- تصنيف الأصناف -->
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('شاهي', this)">🫖 شاهي</button>
            <button class="cat-btn" onclick="filterCat('مخبوزات', this)">🥐 مخبوزات</button>
            <button class="cat-btn" onclick="filterCat('جانبي', this)">🍿 إضافات</button>
        </div>

        <div class="items-grid" id="itemsGrid"></div>
    </div>

    <div class="cart-side">
        <h4 style="margin:0 0 10px; color:var(--maroon)">الفاتورة الحالية</h4>
        <div class="cart-items" id="cartContent"></div>
        
        <div class="totals">
            <div class="total-row"><span>المجموع:</span><span id="sub">0.00</span></div>
            <div class="total-row"><span>الضريبة (15%):</span><span id="tax">0.00</span></div>
            <div class="total-row" style="font-weight:bold; font-size:18px; border-top:1px solid #eee; padding-top:5px;">
                <span>الإجمالي:</span><span id="grand">0.00</span>
            </div>
        </div>

        <div class="action-grid">
            <button class="hold-btn" onclick="holdInvoice()">⏸ تعليق</button>
            <button class="new-btn" onclick="newInvoice()">➕ فاتورة جديدة</button>
            <button class="pay-btn" onclick="processPayment()">✅ دفع وطباعة</button>
        </div>
    </div>
</div>

<!-- منطقة الطباعة المخفية -->
<div id="print-area" style="display:none"></div>

<script>
    const allProducts = [
        {name: "شاي احمر ص", price: 2, cat: "شاهي"}, {name: "شاي احمر و", price: 4, cat: "شاهي"}, {name: "شاي احمر ز", price: 6, cat: "شاهي"},
        {name: "شاي وليف ص", price: 2, cat: "شاهي"}, {name: "شاي وليف و", price: 4, cat: "شاهي"}, {name: "شاي وليف ز", price: 6, cat: "شاهي"},
        {name: "كرك", price: 5, cat: "شاهي"}, {name: "أتاي", price: 5, cat: "شاهي"}, {name: "زنجبيل ليمون", price: 5, cat: "شاهي"},
        {name: "برادي", price: 12, cat: "شاهي"},
        {name: "4 أجبان", price: 12, cat: "مخبوزات"}, {name: "جبنة سائلة", price: 8, cat: "مخبوزات"}, {name: "فطيرة لبنة", price: 8, cat: "مخبوزات"},
        {name: "نحل كلاسيك", price: 15, cat: "مخبوزات"}, {name: "نحل قرفة", price: 16, cat: "مخبوزات"},
        {name: "مكسرات", price: 5, cat: "جانبي"}, {name: "سمسم", price: 2, cat: "جانبي"}, {name: "ماء", price: 1, cat: "جانبي"}
    ];

    let currentQty = 1;
    let invoices = { "1": [] };
    let activeInv = "1";

    function setQty(n, btn) {
        currentQty = n;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = allProducts.filter(p => p.cat === cat);
        document.getElementById('itemsGrid').innerHTML = filtered.map(p => `
            <button class="item-card" onclick="addToCart('${p.name}', ${p.price})">
                ${p.name} <b>${p.price} ﷼</b>
            </button>`).join('');
    }

    function addToCart(name, price) {
        for(let i=0; i<currentQty; i++) invoices[activeInv].push({name, price});
        updateUI();
    }

    function updateUI() {
        const content = document.getElementById('cartContent');
        content.innerHTML = invoices[activeInv].map((item, idx) => `
            <div class="cart-row"><span>${item.name}</span> <span>${item.price} <button onclick="remove(${idx})" style="border:none; color:red; background:none;">✕</button></span></div>
        `).join('');
        
        let sub = invoices[activeInv].reduce((s, i) => s + i.price, 0);
        let tax = sub * 0.15;
        document.getElementById('sub').innerText = sub.toFixed(2);
        document.getElementById('tax').innerText = tax.toFixed(2);
        document.getElementById('grand').innerText = (sub + tax).toFixed(2);
        renderTabs();
    }

    function remove(idx) { invoices[activeInv].splice(idx, 1); updateUI(); }

    function newInvoice() {
        let id = Date.now().toString().slice(-4);
        invoices[id] = [];
        activeInv = id;
        updateUI();
    }

    function renderTabs() {
        document.getElementById('tabsBar').innerHTML = Object.keys(invoices).map(id => `
            <button class="invoice-tab ${activeInv==id?'active':''}" onclick="activeInv='${id}'; updateUI()">فاتورة ${id}</button>
        `).join('');
    }

    function processPayment() {
        if(invoices[activeInv].length === 0) return;
        const total = document.getElementById('grand').innerText;
        
        // تجهيز الطباعة
        let printHTML = `<h3>شاهي وليف</h3><p>رقم الفاتورة: ${activeInv}</p><hr>`;
        invoices[activeInv].forEach(i => printHTML += `<p>${i.name} - ${i.price} ﷼</p>`);
        printHTML += `<hr><b>الإجمالي: ${total} ﷼</b><br><small>شامل الضريبة 15%</small>`;
        
        document.getElementById('print-area').innerHTML = printHTML;
        window.print();

        delete invoices[activeInv];
        if(Object.keys(invoices).length === 0) invoices["1"] = [];
        activeInv = Object.keys(invoices)[0];
        updateUI();
    }

    window.onload = () => filterCat('شاهي', document.querySelector('.cat-btn'));
</script>
</body>
</html>
