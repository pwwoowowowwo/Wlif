<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كاشير شاهي وليف - المطور</title>
    <style>
        :root { --bg: #f8f9fa; --maroon: #800000; --dark: #1a1c23; --shadow: 0 4px 6px rgba(0,0,0,0.1); }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { height: 50px; background: var(--dark); color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .tax-id { color: #ffeb3b; font-size: 14px; font-weight: bold; }

        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }

        /* منطقة المنتجات */
        .menu-side { flex: 3; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .category-bar { display: flex; gap: 8px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 5px; }
        .cat-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; box-shadow: var(--shadow); font-weight: bold; cursor: pointer; background: white; }
        .cat-btn.active { background: var(--maroon); color: white; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .item-card { background: white; border-radius: 12px; aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #eee; cursor: pointer; text-align: center; box-shadow: var(--shadow); }
        .item-card b { color: var(--maroon); margin-top: 5px; font-size: 16px; }

        /* السلة - تصغير الطول 50% */
        .cart-side { flex: 1.2; min-width: 250px; background: white; border-radius: 12px; box-shadow: var(--shadow); display: flex; flex-direction: column; padding: 12px; border-top: 5px solid var(--maroon); }
        .cart-items-container { height: 50%; overflow-y: auto; border-bottom: 2px solid #f0f0f0; margin-bottom: 10px; padding-bottom: 5px; }
        .cart-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f9f9f9; font-size: 14px; }

        /* لوحة الأرقام تحت السلة مباشرة */
        .numpad-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .num-btn { padding: 10px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .num-btn.active { background: var(--maroon); color: white; border-color: var(--maroon); }

        .payment-box { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .pay-btn { padding: 8px; border: 1px solid #ccc; border-radius: 6px; background: white; cursor: pointer; font-weight: bold; font-size: 13px; }
        .pay-btn.active { background: #e3f2fd; border-color: #2196f3; color: #2196f3; }

        .totals-area { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; }
        .total-line { display: flex; justify-content: space-between; font-size: 13px; }
        .final-price { font-size: 24px; font-weight: bold; color: var(--maroon); text-align: center; border-top: 2px solid #eee; margin-top: 5px; padding-top: 5px; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-pay { grid-column: span 2; background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px #1b5e20; }
        .btn-pay:active { box-shadow: 0 1px #1b5e20; transform: translateY(3px); }
        .btn-hold { background: #ffa000; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-new { background: #0277bd; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        @media print {
            body * { visibility: hidden; }
            #receipt, #receipt * { visibility: visible; }
            #receipt { position: absolute; left: 0; top: 0; width: 80mm; padding: 4mm; text-align: center; font-size: 12px; }
            .r-line { display: flex; justify-content: space-between; margin: 3px 0; }
        }
    </style>
</head>
<body>

<header>
    <span>🍃 شاهي وليف | POS</span>
    <span class="tax-id">الرقم الضريبي: 310071502100003</span>
</header>

<div class="main-layout">
    <div class="menu-side">
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('tea', this)">الشاهي</button>
            <button class="cat-btn" onclick="filterCat('bakery', this)">المخبوزات</button>
            <button class="cat-btn" onclick="filterCat('sides', this)">الإضافات</button>
        </div>
        <div id="itemsGrid" class="items-grid"></div>
    </div>

    <div class="cart-side">
        <div style="font-weight: bold; text-align: center; margin-bottom: 5px; color: #555;" id="invNum">طلب جديد #1</div>
        
        <!-- منطقة الأصناف (50% من الارتفاع) -->
        <div class="cart-items-container" id="cartList"></div>
        
        <!-- لوحة الأرقام المفصولة -->
        <div class="numpad-box">
            <button class="num-btn active" onclick="setQty(1, this)">1</button>
            <button class="num-btn" onclick="setQty(2, this)">2</button>
            <button class="num-btn" onclick="setQty(3, this)">3</button>
            <button class="num-btn" onclick="setQty(4, this)">4</button>
            <button class="num-btn" onclick="setQty(5, this)">5</button>
            <button class="num-btn" onclick="setQty(6, this)">6</button>
            <button class="num-btn" onclick="setQty(7, this)">7</button>
            <button class="num-btn" onclick="setQty(8, this)">8</button>
            <button class="num-btn" onclick="setQty(9, this)">9</button>
            <button class="num-btn" style="grid-column: span 3" onclick="setQty(10, this)">10</button>
        </div>

        <!-- اختيار طريقة الدفع -->
        <div class="payment-box">
            <button class="pay-btn active" id="payCash" onclick="setPay('نقدي', this)">💵 كاش</button>
            <button class="pay-btn" id="payCard" onclick="setPay('شبكة', this)">💳 شبكة</button>
        </div>

        <div class="totals-area">
            <div class="total-line"><span>الإجمالي (بدون ضريبة):</span><span id="subTotal">0.00</span></div>
            <div class="total-line"><span>الضريبة (15%):</span><span id="taxAmount">0.00</span></div>
            <div class="final-price"><span id="grandTotal">0.00</span> ﷼</div>
        </div>

        <div class="action-btns">
            <button class="btn-pay" onclick="finishSale()">إنهاء وطباعة الفاتورة 🖨️</button>
            <button class="btn-hold" onclick="holdInv()">تعليق الفاتورة</button>
            <button class="btn-new" onclick="newOrder()">طلب جديد</button>
        </div>
    </div>
</div>

<div id="receipt" style="display:none"></div>

<script>
    const products = [
        { name: "شاهي أحمر (ص)", price: 2, cat: "tea" }, { name: "شاهي وليف (ص)", price: 2, cat: "tea" },
        { name: "شاهي أحمر (و)", price: 4, cat: "tea" }, { name: "شاهي وليف (و)", price: 4, cat: "tea" },
        { name: "فطيرة مكس", price: 12, cat: "bakery" }, { name: "خلية نحل", price: 15, cat: "bakery" },
        { name: "مكسرات", price: 5, cat: "sides" }, { name: "ماء", price: 1, cat: "sides" }
    ];

    let cart = [];
    let currentQty = 1;
    let invCounter = 1;
    let payMethod = "نقدي";

    function setQty(n, btn) {
        currentQty = n;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setPay(method, btn) {
        payMethod = method;
        document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('itemsGrid').innerHTML = products.filter(p => p.cat === cat).map(p => `
            <div class="item-card" onclick="addToCart('${p.name}', ${p.price})">
                <span>${p.name}</span><b>${p.price} ﷼</b>
            </div>`).join('');
    }

    function addToCart(name, price) {
        for(let i=0; i<currentQty; i++) cart.push({ name, price });
        render();
    }

    function render() {
        document.getElementById('cartList').innerHTML = cart.map((item, i) => `
            <div class="cart-row"><span>${item.name}</span><span>${item.price.toFixed(2)} <small onclick="cart.splice(${i},1);render()" style="color:red;cursor:pointer;margin-right:5px">✕</small></span></div>
        `).join('');
        let sub = cart.reduce((s, i) => s + i.price, 0);
        let tax = sub * 0.15;
        document.getElementById('subTotal').innerText = sub.toFixed(2);
        document.getElementById('taxAmount').innerText = tax.toFixed(2);
        document.getElementById('grandTotal').innerText = (sub + tax).toFixed(2);
    }

    function holdInv() {
        if(cart.length > 0) {
            alert("تم تعليق الفاتورة #" + invCounter + " وفتح صفحة جديدة");
            newOrder();
        }
    }

    function newOrder() {
        cart = [];
        invCounter++;
        document.getElementById('invNum').innerText = "طلب جديد #" + invCounter;
        render();
    }

    function finishSale() {
        if(cart.length === 0) return;
        const sub = document.getElementById('subTotal').innerText;
        const tax = document.getElementById('taxAmount').innerText;
        const total = document.getElementById('grandTotal').innerText;
        const date = new Date().toLocaleString('ar-SA');

        let html = `<h3>شاهي وليف 🍃</h3>
                    <p>فاتورة ضريبية مبسطة</p>
                    <p style="font-size:10px">الرقم الضريبي: 310071502100003</p>
                    <p style="font-size:10px">${date}</p><hr>`;
        
        cart.forEach(i => html += `<div class="r-line"><span>${i.name}</span><span>${i.price.toFixed(2)}</span></div>`);
        html += `<hr><div class="r-line"><span>الإجمالي (بدون ضريبة)</span><span>${sub}</span></div>`;
        html += `<div class="r-line"><span>الضريبة 15%</span><span>${tax}</span></div>`;
        html += `<div class="r-line" style="font-size:16px"><b>الإجمالي النهائي</b><b>${total} ﷼</b></div><hr>`;
        html += `<div class="r-line"><span>طريقة الدفع:</span><span>${payMethod}</span></div><hr>`;
        html += `<p>شكراً لتسوقكم</p>`;
        
        document.getElementById('receipt').innerHTML = html;
        window.print();
        newOrder();
    }

    window.onload = () => filterCat('tea', document.querySelector('.cat-btn'));
</script>
</body>
</html>
