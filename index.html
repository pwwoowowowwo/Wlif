<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاهي وليف - النسخة المعتمدة</title>
    <style>
        :root { 
            --bg: #e0e5ec;
            --shadow-out: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
            --shadow-in: inset 6px 6px 12px #a3b1c6, inset -6px -6px 12px #ffffff;
            --maroon: #800000;
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            color: var(--maroon);
            font-weight: 900;
            font-size: 28px;
        }

        /* شريط أزرار الإدارة تحت الترويسة */
        .admin-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* إطار قائمة الأصناف */
        .menu-border {
            border: 2px solid #a3b1c6;
            border-radius: 30px;
            padding: 20px;
            box-shadow: var(--shadow-in);
            max-width: 420px;
            text-align: center;
        }

        .menu-title {
            color: var(--maroon);
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 20px;
        }

        /* حاوية النظام */
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            padding: 20px;
            justify-content: center;
            max-width: 1100px;
        }

        .neu-card {
            background: var(--bg);
            border-radius: 30px;
            box-shadow: var(--shadow-out);
            padding: 20px;
            border: none;
        }

        /* الأزرار */
        .product-btn, .neu-btn, .tab {
            background: var(--bg);
            box-shadow: var(--shadow-out);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            color: #444;
        }

        .product-btn {
            width: 110px;
            height: 100px;
            margin: 8px;
            border-radius: 20px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .product-btn:active, .neu-btn:active, .tab:active {
            box-shadow: var(--shadow-in);
            transform: scale(0.97);
        }

        /* أقسام الأصناف داخل الإطار */
        .cat-filter-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .cat-tab {
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 13px;
        }

        .cat-tab.active { box-shadow: var(--shadow-in); color: var(--maroon); }

        /* السلة */
        .cart-section {
            width: 350px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .screen {
            background: var(--bg);
            box-shadow: var(--shadow-in);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            flex-grow: 1;
            min-height: 200px;
            overflow-y: auto;
        }

        .total-display {
            font-size: 32px;
            font-weight: 900;
            color: var(--maroon);
            text-align: center;
            margin: 10px 0;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .neu-btn { padding: 15px; border-radius: 15px; font-size: 14px; }
        .btn-pay { color: #059669; }
        .btn-hold { color: #d97706; }
        .btn-clear { color: #dc2626; }

        /* تابات التعليق */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; width: 100%; justify-content: center; }
        .tab { padding: 10px 20px; border-radius: 15px; font-size: 12px; }
        .tab.active { box-shadow: var(--shadow-in); color: var(--maroon); }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px inset rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="header">🍃 شاهي وليف</div>

    <div class="admin-bar">
        <button class="neu-btn" onclick="alert('إدارة الكاشير')">🏪 إدارة الكاشير</button>
        <button class="neu-btn" onclick="alert('إدارة الفواتير')">📄 إدارة الفواتير</button>
        <button class="neu-btn" onclick="alert('التقرير الشهري')">📊 التقرير الشهري</button>
    </div>

    <div id="tab-bar" class="tabs"></div>

    <div class="container">
        <div class="menu-border">
            <div class="menu-title">📋 قائمة الأصناف</div>
            
            <div class="cat-filter-bar">
                <button class="cat-tab tab active" onclick="filterCat('الكل', this)">الكل</button>
                <button class="cat-tab tab" onclick="filterCat('شاهي', this)">☕ شاهي</button>
                <button class="cat-tab tab" onclick="filterCat('ألعاب', this)">🎲 ألعاب</button>
                <button class="cat-tab tab" onclick="filterCat('مخبوزات', this)">🥐 مخبوزات</button>
            </div>

            <div id="product-list">
                </div>
        </div>

        <div class="cart-section neu-card">
            <div class="total-display" id="total-val">0.00 ﷼</div>
            <div class="screen" id="cart-content"></div>
            
            <div class="controls">
                <button class="neu-btn btn-pay" onclick="pay('كاش')">💵 كاش</button>
                <button class="neu-btn btn-pay" onclick="pay('شبكة')">💳 شبكة</button>
                <button class="neu-btn btn-hold" onclick="holdInvoice()">⏸ تعليق</button>
                <button class="neu-btn btn-clear" onclick="clearCart()">✖ مسح</button>
            </div>
        </div>
    </div>

<script>
    const products = [
        {name: "كرك وليف", price: 3, cat: "شاهي"},
        {name: "شاي نعناع", price: 2, cat: "شاهي"},
        {name: "جاكارو", price: 10, cat: "ألعاب"},
        {name: "فطيرة جبن", price: 5, cat: "مخبوزات"},
        {name: "كرواسون", price: 7, cat: "مخبوزات"},
        {name: "ماء", price: 1, cat: "شاهي"}
    ];

    let invoices = { 'الرئيسي': [] };
    let activeId = 'الرئيسي';
    let holdCounter = 0;
    let currentFilter = 'الكل';

    function filterCat(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderProducts();
    }

    function renderProducts() {
        const list = document.getElementById('product-list');
        const filtered = currentFilter === 'الكل' ? products : products.filter(p => p.cat === currentFilter);
        list.innerHTML = filtered.map(p => `
            <button class="product-btn" onclick="addToCart('${p.name}', ${p.price})">
                <span style="font-size:13px">${p.name}</span>
                <span style="color:var(--maroon); margin-top:5px; font-size:14px;">${p.price} ﷼</span>
            </button>
        `).join('');
    }

    function addToCart(name, price) {
        const cart = invoices[activeId];
        const item = cart.find(i => i.name === name);
        if(item) item.qty++; else cart.push({name, price, qty: 1});
        updateUI();
    }

    function updateUI() {
        const content = document.getElementById('cart-content');
        const cart = invoices[activeId];
        content.innerHTML = cart.length === 0 ? '<p style="text-align:center; color:#999; margin-top:50px;">السلة فارغة</p>' : 
            cart.map(i => `<div class="item-row"><span>${i.name} × ${i.qty}</span><span>${(i.price * i.qty).toFixed(2)} ﷼</span></div>`).join('');

        let total = cart.reduce((s, i) => s + (i.price * i.qty), 0) * 1.15;
        document.getElementById('total-val').innerText = total.toFixed(2) + " ﷼";
        renderTabs();
    }

    function holdInvoice() {
        if(invoices[activeId].length === 0 && activeId === 'الرئيسي') return;
        holdCounter++;
        const newId = 'طلب ' + holdCounter;
        invoices[newId] = [];
        activeId = newId;
        updateUI();
    }

    function renderTabs() {
        const bar = document.getElementById('tab-bar');
        bar.innerHTML = Object.keys(invoices).map(id => `
            <div class="tab ${activeId === id ? 'active' : ''}" onclick="switchTab('${id}')">
                ${id} ${invoices[id].length > 0 ? '●' : ''}
            </div>
        `).join('');
    }

    function switchTab(id) { activeId = id; updateUI(); }

    function pay(method) {
        if(invoices[activeId].length === 0) return;
        alert("تم الدفع بنجاح عبر: " + method);
        if(activeId === 'الرئيسي') invoices['الرئيسي'] = []; else { delete invoices[activeId]; activeId = 'الرئيسي'; }
        updateUI();
    }

    function clearCart() { if(confirm("مسح السلة؟")) { invoices[activeId] = []; updateUI(); } }

    window.onload = () => { renderProducts(); updateUI(); };
</script>
</body>
</html>
