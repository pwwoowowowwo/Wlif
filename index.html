<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كاشير شاهي وليف الذكي</title>
    <style>
        :root { --bg: #e0e5ec; --maroon: #800000; --shadow: 1px 1px 3px #bebebe, -1px -1px 3px #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* التجاوب الذكي: يعتمد على طول وعرض الشاشة الحقيقي */
        body { background: var(--bg); margin: 0; height: 100vh; display: flex; flex-direction: column; font-size: 2.5vmin; overflow: hidden; }

        header { height: 6vh; background: #1a1c23; color: white; display: flex; align-items: center; padding: 0 2vw; justify-content: space-between; font-size: 3vmin; }

        .tabs-bar { display: flex; background: #cfd4da; padding: 0.5vh 1vw 0; gap: 1vw; overflow-x: auto; height: 5vh; }
        .invoice-tab { padding: 0 3vw; border: none; border-radius: 4px 4px 0 0; background: #bdc3c7; cursor: pointer; font-size: 2vmin; white-space: nowrap; }
        .invoice-tab.active { background: var(--bg); color: var(--maroon); font-weight: bold; }

        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 1vh; gap: 1vw; }

        /* يمين: المنتجات - مرن حسب الشاشة */
        .menu-side { flex: 2.5; display: flex; flex-direction: column; gap: 1vh; }
        .numpad { display: flex; gap: 0.5vw; background: white; padding: 1vh; border-radius: 6px; box-shadow: var(--shadow); justify-content: center; }
        .num-btn { width: 8vw; max-width: 40px; height: 8vw; max-height: 40px; border-radius: 4px; border: none; background: var(--bg); font-weight: bold; font-size: 3vmin; }
        .num-btn.active { background: var(--maroon); color: white; }

        .category-bar { display: flex; gap: 1vw; }
        .cat-btn { flex: 1; padding: 1.5vh; border-radius: 6px; border: none; background: white; box-shadow: var(--shadow); font-size: 2.5vmin; font-weight: bold; }
        .cat-btn.active { background: var(--maroon); color: white; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(18vw, 1fr)); gap: 1vh; overflow-y: auto; padding: 0.5vh; flex: 1; }
        .item-card { background: white; border-radius: 6px; aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; align-items: center; border: none; box-shadow: var(--shadow); font-size: 2.2vmin; padding: 1vh; }
        .item-card b { color: var(--maroon); margin-top: 0.5vh; font-size: 2.5vmin; }

        /* يسار: السلة - تم تصغيرها وزيادة مرونتها */
        .cart-side { flex: 1.2; min-width: 150px; display: flex; flex-direction: column; background: white; border-radius: 10px; box-shadow: var(--shadow); padding: 1vh; }
        .cart-items { flex-grow: 1; overflow-y: auto; border-bottom: 1px dashed #eee; margin-bottom: 1vh; }
        .cart-row { display: flex; justify-content: space-between; padding: 0.8vh 0; font-size: 2.2vmin; border-bottom: 1px solid #f9f9f9; }
        
        .totals-section { background: #fdfdfd; padding: 1vh; border-radius: 6px; border: 1px solid #eee; margin-bottom: 1vh; }
        .total-row { display: flex; justify-content: space-between; font-size: 2vmin; margin-bottom: 0.5vh; color: #555; }
        
        .grand-total-box { display: flex; justify-content: space-between; align-items: center; background: #fff5f5; padding: 1.2vh; border-radius: 6px; border: 1.5px solid var(--maroon); color: var(--maroon); }
        .grand-total-label { font-size: 2.8vmin; font-weight: bold; }
        .grand-total-value { font-size: 3.5vmin; font-weight: bold; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1vh; }
        .pay-btn { grid-column: span 2; background: #28a745; color: white; padding: 2vh; border-radius: 8px; border: none; font-size: 3.2vmin; font-weight: bold; cursor: pointer; }
        .hold-btn, .new-btn { background: #6c757d; color: white; border: none; border-radius: 6px; padding: 1.5vh; font-size: 2.2vmin; }
        .new-btn { background: #007bff; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; text-align: center; font-size: 14px; }
        }
    </style>
</head>
<body>

<header>
    <span>🍃 شاهي وليف | POS</span>
    <span style="font-size: 2vmin;">فهد مرزوق المخلفي</span>
</header>

<div class="tabs-bar" id="tabsBar"></div>

<div class="main-layout">
    <div class="menu-side">
        <div class="numpad" id="numpad">
            <script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn ${i==1?'active':''}" onclick="setQty(${i}, this)">${i}</button>`);</script>
        </div>
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterCat('شاهي', this)">الشاهي</button>
            <button class="cat-btn" onclick="filterCat('مخبوزات', this)">المخبوزات</button>
            <button class="cat-btn" onclick="filterCat('جانبي', this)">إضافات</button>
        </div>
        <div class="items-grid" id="itemsGrid"></div>
    </div>

    <div class="cart-side">
        <div class="cart-items" id="cartContent"></div>
        
        <div class="totals-section">
            <div class="total-row"><span>المجموع:</span><span id="sub">0.00</span></div>
            <div class="total-row"><span>الضريبة:</span><span id="tax">0.00</span></div>
            <div class="grand-total-box">
                <span class="grand-total-label">الإجمالي:</span>
                <span class="grand-total-value"><span id="grand">0.00</span></span>
            </div>
        </div>

        <div class="action-grid">
            <button class="hold-btn" onclick="holdInvoice()">تعليق</button>
            <button class="new-btn" onclick="newInvoice()">جديدة</button>
            <button class="pay-btn" onclick="processPayment()">دفع وطباعة التفاصيل ✅</button>
        </div>
    </div>
</div>

<div id="print-area" style="display:none"></div>

<script>
    const allProducts = [
        {name: "شاهي أحمر ص", price: 2, cat: "شاهي"}, {name: "شاهي أحمر و", price: 4, cat: "شاهي"}, {name: "شاهي أحمر ز", price: 6, cat: "شاهي"},
        {name: "شاهي وليف ص", price: 2, cat: "شاهي"}, {name: "شاهي وليف و", price: 4, cat: "شاهي"}, {name: "شاهي وليف ز", price: 6, cat: "شاهي"},
        {name: "شاهي مدخن ص", price: 2, cat: "شاهي"}, {name: "شاهي مدخن و", price: 4, cat: "شاهي"}, {name: "شاهي مدخن ز", price: 6, cat: "شاهي"},
        {name: "كرك", price: 5, cat: "شاهي"}, {name: "أتاي مغربي", price: 5, cat: "شاهي"}, {name: "زنجبيل ليمون", price: 5, cat: "شاهي"},
        {name: "برادي شاهي", price: 12, cat: "شاهي"}, {name: "برادي أخضر", price: 12, cat: "شاهي"},
        {name: "فطيرة 4 أجبان", price: 12, cat: "مخبوزات"}, {name: "جبنة سائلة", price: 8, cat: "مخبوزات"}, {name: "لبنة", price: 8, cat: "مخبوزات"},
        {name: "شيدر", price: 8, cat: "مخبوزات"}, {name: "نحل كلاسيك", price: 15, cat: "مخبوزات"}, {name: "نحل قرفة", price: 16, cat: "مخبوزات"},
        {name: "مكسرات علبة", price: 5, cat: "جانبي"}, {name: "مكسرات يد", price: 5, cat: "جانبي"}, {name: "رغيفة سمسم", price: 2, cat: "جانبي"}, 
        {name: "بسكوت مالح", price: 2, cat: "جانبي"}, {name: "ماء", price: 1, cat: "جانبي"}
    ];

    let currentQty = 1;
    let invoices = { "1": [] };
    let activeInv = "1";

    function setQty(n, btn) {
        currentQty = n;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = allProducts.filter(p => p.cat === cat);
        document.getElementById('itemsGrid').innerHTML = filtered.map(p => `
            <button class="item-card" onclick="addToCart('${p.name}', ${p.price})">
                <span>${p.name}</span> <b>${p.price}</b>
            </button>`).join('');
    }

    function addToCart(name, price) {
        for(let i=0; i<currentQty; i++) invoices[activeInv].push({name, price});
        updateUI();
    }

    function updateUI() {
        const content = document.getElementById('cartContent');
        content.innerHTML = invoices[activeInv].length ? invoices[activeInv].map((item, idx) => `
            <div class="cart-row"><span>${item.name}</span> <span>${item.price} <button onclick="remove(${idx})" style="border:none; color:red; background:none;">✕</button></span></div>
        `).join('') : '<div style="text-align:center; padding-top:2vh; color:#999">السلة فارغة</div>';
        
        let sub = invoices[activeInv].reduce((s, i) => s + i.price, 0);
        let tax = sub * 0.15;
        document.getElementById('sub').innerText = sub.toFixed(2);
        document.getElementById('tax').innerText = tax.toFixed(2);
        document.getElementById('grand').innerText = (sub + tax).toFixed(2);
        renderTabs();
    }

    function remove(idx) { invoices[activeInv].splice(idx, 1); updateUI(); }
    function newInvoice() {
        let id = (Object.keys(invoices).length + 1).toString();
        invoices[id] = [];
        activeInv = id;
        updateUI();
    }
    function holdInvoice() { newInvoice(); }
    function renderTabs() {
        document.getElementById('tabsBar').innerHTML = Object.keys(invoices).map(id => `
            <button class="invoice-tab ${activeInv==id?'active':''}" onclick="activeInv='${id}'; updateUI()">طلب ${id}</button>
        `).join('');
    }

    function processPayment() {
        if(invoices[activeInv].length === 0) return;
        const sub = document.getElementById('sub').innerText;
        const tax = document.getElementById('tax').innerText;
        const total = document.getElementById('grand').innerText;
        
        let printHTML = `<div style="text-align:center"><h3>شاهي وليف 🍃</h3><p>فاتورة ضريبية مبسطة</p><hr>`;
        invoices[activeInv].forEach(i => printHTML += `<div style="display:flex; justify-content:space-between"><span>${i.name}</span><span>${i.price} ﷼</span></div>`);
        printHTML += `<hr><p>المجموع: ${sub}</p><p>الضريبة (15%): ${tax}</p><h4>الإجمالي: ${total} ﷼</h4></div>`;
        
        document.getElementById('print-area').innerHTML = printHTML;
        window.print();
        
        delete invoices[activeInv];
        if(Object.keys(invoices).length === 0) invoices["1"] = [];
        activeInv = Object.keys(invoices)[0];
        updateUI();
    }

    window.onload = () => filterCat('شاهي', document.querySelector('.cat-btn'));
</script>
</body>
</html>
